<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>WIN5 収支計算</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: "メイリオ", Meiryo, Hiragino Sans, Hiragino Kaku Gothic ProN, 'ヒラギノ角ゴ ProN W3', 'ヒラギノ角ゴ Pro W3', Helvetica Neue, Helvetica, sans-serif;
            margin: 10px;
        }

        * {
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        h2 {
            margin-top: 32px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 50px;
            font-size: 15px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: #e0f0ff;
            font-weight: bold;
        }

        .btn {
            padding: 8px 14px;
            font-size: 20px;
            background: #3251BC;
            color: #fff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            -webkit-appearance: none;
            appearance: none;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.98);
            filter: brightness(0.98);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.18) inset, 0 6px 14px rgba(0, 0, 0, 0.10);
        }

        .btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.35), 0 10px 24px rgba(0, 0, 0, 0.12);
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            filter: none;
            box-shadow: none;
        }

        input,
        select {
            padding: 6px 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            background: #fff;
            color: #333;
        }

        .summary-table {
            table-layout: fixed;
            border-collapse: collapse;
            border-top: 2px solid #d6d6d6;
        }

        .summary-table th,
        .summary-table td {
            border: none !important;
            background: transparent !important;
            padding: 14px 10px;
        }

        .summary-table tr {
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-table tr:first-child {
            border-bottom: 2px solid #d6d6d6;
        }

        .summary-table tr:last-child {
            border-bottom: 2px solid #d6d6d6;
        }

        .summary-table th {
            font-weight: 700;
            color: #555;
        }

        .summary-table td {
            color: #444;
        }

        .month-summary {
            margin-top: 14px;
        }

        .month-summary-label {
            color: #777;
            font-size: 18px;
            font-weight: 800;
        }

        .month-summary-body {
            display: flex;
            justify-content: space-between;
            gap: 14px;
        }

        .month-profit {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 0.2px;
        }

        .month-side {
            min-width: 160px;
            display: grid;
            gap: 10px;
        }

        .day-summary {
            margin-top: 18px;
        }

        .day-summary-date {
            color: #777;
            font-size: 18px;
            font-weight: 800;
        }

        .day-summary-list {
            display: grid;
            gap: 18px;
            margin-top: 16px;
        }

        .day-summary-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .day-entry-profit {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 0.2px;
        }

        .day-entry-side {
            min-width: 160px;
            display: grid;
            gap: 10px;
        }

        .ms-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 14px;
            font-size: 18px;
            font-weight: 800;
        }

        .ms-row .ms-val {
            text-align: right;
            color: #888;
            font-weight: 800;
        }

        .summary-table col.summary-col-label {
            width: 22%;
        }

        .summary-table col.summary-col-money {
            width: 26%;
        }

        .summary-table th:nth-child(2),
        .summary-table th:nth-child(3),
        .summary-table th:nth-child(4),
        .summary-table td:nth-child(2),
        .summary-table td:nth-child(3),
        .summary-table td:nth-child(4) {
            text-align: center;
        }

        .profit-box {
            font-size: 30px;
            margin-bottom: 12px;
            text-align: center;
        }

        .profit-label {
            font-weight: bold;
        }

        .profit-box #yearFilter {
            font: inherit;
            font-weight: bold;
            color: inherit;
            -webkit-text-fill-color: currentColor;
            background: transparent;
            border: 0;
            padding: 0;
            margin: 0;
            width: auto;
            min-width: 0;
            line-height: inherit;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }

        .profit {
            color: #0070f3;
            font-weight: bold;
        }

        .loss {
            color: #d40000;
            font-weight: bold;
        }

        .container {
            max-width: 950px;
            margin: auto;
        }

        .ns-toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            opacity: 0;
            padding: 20px 36px;
            border-radius: 14px;
            background: rgba(20, 20, 20, 0.88);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            font-size: 22px;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: .01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2147483647;
            pointer-events: none;
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
            max-width: min(90vw, 400px);
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,.18), 0 0 0 0.5px rgba(0,0,0,.12);
            transition: opacity .15s ease, transform .15s ease;
        }
        .ns-toast[data-visible="1"] {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .delete-btn {
            background: transparent;
            border: none;
            width: 12px;
            height: 32px;
            font-size: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #333;
            -webkit-text-fill-color: #333;
            -webkit-appearance: none;
            appearance: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            padding: 0;
            outline: none;
        }

        .delete-btn:focus,
        .delete-btn:active {
            color: #333;
            -webkit-text-fill-color: #333;
        }

        .delete-mode-btn {
            background-color: #555;
        }

        body.delete-mode .delete-mode-btn {
            background-color: #d92c2c;
        }

        .calendar-block {
            margin-top: 8px;
        }

        .cal-header {
            display: grid;
            grid-template-columns: 44px 1fr 44px;
            align-items: center;
            gap: 8px;
            margin: 6px 0 8px;
        }

        .cal-nav {
            border: none;
            background: transparent;
            font-size: 28px;
            line-height: 1;
            height: 40px;
            cursor: pointer;
            border-radius: 10px;
            -webkit-appearance: none;
            appearance: none;
            color: #111;
            -webkit-text-fill-color: #111;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        .cal-nav:active {
            transform: scale(0.98);
        }

        .cal-title {
            border: none;
            background: transparent;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            padding: 6px 8px;
            border-radius: 10px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            color: #111;
            -webkit-text-fill-color: #111;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        .cal-title:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.25);
        }

        #monthPicker {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .cal-dow {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0;
            padding: 0 2px;
            box-sizing: border-box;
            border-bottom: 1px solid #ddd;
        }

        .cal-dow div {
            text-align: center;
            font-size: 13px;
            padding: 8px 0;
            font-weight: 700;
        }

        .cal-dow .sat {
            color: #0b63d1;
        }

        .cal-dow .sun {
            color: #d40000;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0;
            padding: 0 2px;
            box-sizing: border-box;
        }

        .cal-cell {
            min-height: 54px;
            padding: 6px 6px 10px;
            border-top: 1px solid #eee;
            cursor: pointer;
            position: relative;
            background: #fff;
            text-align: center;
            min-width: 0;
        }

        .cal-cell.outside {
            background: #fff;
            cursor: default;
        }

        .cal-dayline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .cal-daynum {
            font-size: 16px;
            font-weight: 800;
            line-height: 1;
            display: flex;
            justify-content: center;
        }

        .cal-daychip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 999px;
        }

        .cal-cell.selected .cal-daychip {
            background: #38a169;
            color: #fff;
        }

        .cal-cell.sat .cal-daynum {
            color: #111;
        }

        .cal-cell.sun .cal-daynum {
            color: #111;
        }

        .cal-cell.selected .cal-daynum {
            color: inherit;
        }

        .cal-amt {
            display: inline-block;
            position: static;
            margin-top: 6px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            opacity: 0.9;
            white-space: nowrap;
            overflow-wrap: normal;
            word-break: normal;
            max-width: 100%;
            line-height: 1.05;
        }

        .cal-amt.pos {
            color: #0070f3;
        }

        .cal-amt.neg {
            color: #d40000;
        }

        .day-editor {
            margin-top: 18px;
            border-top: 1px solid #eee;
            padding-top: 14px;
        }

        .day-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .day-list {
            display: grid;
            gap: 10px;
        }

        .entry-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 0.8fr 34px;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid #eee;
            border-radius: 10px;
            background: #fff;
        }

        .entry-row input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            padding: 6px 8px;
        }

        .entry-row input[type="text"] {
            text-align: right;
        }

        .entry-delete {
            display: none;
        }

        body.delete-mode .entry-delete {
            display: inline-flex;
        }

        .empty-hint {
            color: #777;
            font-size: 14px;
            padding: 10px 2px 0;
        }

        @media (max-width: 640px) {
            body {
                margin: 10px;

                .ms-row {
                    font-size: 16px;
                }

                .month-side {
                    min-width: 150px;
                }

            }

            .btn {
                font-size: 16px;
                padding: 6px 10px;
            }

            .profit-box {
                font-size: 24px;
            }

            table {
                font-size: 13px;
            }

            th,
            td {
                padding: 4px 6px;
            }

            .cal-title {
                font-size: 20px;
            }

            .cal-cell {
                min-height: 48px;
                padding: 6px 6px 10px;
            }

            .cal-daynum {
                font-size: 15px;
            }

            .cal-amt {
                font-size: 9px;
            }

            .entry-row {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                    "date buyer"
                    "amount payout"
                    "del del";
                gap: 8px;
            }

            .entry-row .entry-date {
                grid-area: date;
            }

            .entry-row .entry-buyer {
                grid-area: buyer;
            }

            .entry-row .entry-amount {
                grid-area: amount;
            }

            .entry-row .entry-payout {
                grid-area: payout;
            }

            .entry-row .entry-delete {
                grid-area: del;
                justify-self: end;
            }
        }

        .day-editor {
            display: none;
        }

        .page-end-actions {
            display: flex;
            justify-content: flex-end;
            padding: 16px 6px 28px;
        }

        .fab-edit {
            position: static;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            border: none;
            background: #2e7d32;
            color: #fff;
            font-size: 32px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 18px rgba(0, 0, 0, .18);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .fab-edit:active {
            transform: scale(.98);
        }

        .editor-overlay {
            position: fixed;
            inset: 0;
            background: #f2f2f7;
            display: none;
            z-index: 5000;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .editor-overlay.show {
            display: block;
        }

        body.editor-open {
            overflow: hidden;
        }

        .editor-top {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #f2f2f7;
            padding: 14px 12px;
            display: grid;
            grid-template-columns: 48px 1fr 74px;
            align-items: center;
            gap: 10px;
        }

        .editor-close {
            width: 50px;
            height: 50px;
            border-radius: 20px;
            background: #fff;
            border: 1px solid #e2e2e7;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            color: #111;
            -webkit-text-fill-color: #111;
            -webkit-appearance: none;
            appearance: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        .editor-title {
            text-align: center;
            font-weight: 800;
            font-size: 20px;
        }

        .editor-save {
            justify-self: end;
            padding: 12px 18px;
            border-radius: 20px;
            background: #fff;
            border: 1px solid #e2e2e7;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            color: #111;
            -webkit-text-fill-color: #111;
            -webkit-appearance: none;
            appearance: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        .editor-body {
            padding: 8px 12px 24px;
        }

        .editor-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #ececf2;
            box-shadow: 0 10px 28px rgba(0, 0, 0, .06);
            padding: 4px 12px;
            margin: 10px 0;
        }

        .editor-field {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .editor-field:last-child {
            border-bottom: none;
        }

        .editor-icon {
            width: 32px;
            height: 32px;
            border-radius: 7px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            flex: 0 0 auto;
        }

        .editor-icon.invest {
            background: #d40000;
        }

        .editor-icon.recover {
            background: #1e6ad6;
        }

        .editor-icon.profit {
            background: #666;
        }

        .editor-icon.buyer {
            background: #30a10e;
        }

        .editor-input {
            flex: 1 1 auto;
            border: none;
            outline: none;
            font-size: 18px;
            padding: 0;
            background: transparent;
        }

        .editor-profit {
            font-size: 18px;
            font-weight: 900;
        }

        .editor-profit.pos {
            color: #1e6ad6;
        }

        .editor-profit.neg {
            color: #d40000;
        }

        .buyer-seg {
            margin-left: auto;
            display: inline-flex;
            border: 1px solid #d7d7de;
            border-radius: 999px;
            overflow: hidden;
            background: #eeeeF5;
        }

        .buyer-btn {
            border: none;
            background: #fff;
            padding: 10px 18px;
            font-weight: 900;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            min-width: 88px;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        .buyer-btn+.buyer-btn {
            border-left: 1px solid #d7d7de;
        }

        .buyer-btn.active {
            background: #3251bc;
            color: #fff;
        }

        .editor-delete {
            width: 100%;
            margin-top: 14px;
            padding: 14px 12px;
            border-radius: 16px;
            border: 1px solid #ececf2;
            background: #fff;
            color: #d40000;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
        }

        @media (max-width: 760px) {
            .fab-edit {
                display: inline-flex;
            }
        }

        .menu-container {
            position: relative;
            margin-bottom: 20px;
        }

        .menu-button {
            background: transparent;
            color: #000;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            border: none;
            -webkit-appearance: none;
            appearance: none;
            box-shadow: none;
            transition: transform 0.06s ease;
        }

        .menu-icon {
            font-size: 40px;
            line-height: 1;
            display: inline-block;
        }

        .menu-list {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-width: 140px;
            z-index: 999;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        .menu-list a {
            display: block;
            padding: 10px 14px;
            color: #333;
            border-bottom: 1px solid #eee;
            text-decoration: none;
        }

        .menu-list a:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>


    <div class="menu-container">
        <div class="menu-button" onclick="toggleMenu()">
            <span class="menu-icon">☰</span>
        </div>
        <div class="menu-list" id="globalMenu">
            <a href="./calc.html">買い目計算</a>
            <a href="./shushi.html">収支計算</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const m = document.getElementById("globalMenu");
            m.style.display = m.style.display === "block" ? "none" : "block";
        }
        document.addEventListener("click", e => {
            const menu = document.getElementById("globalMenu");
            const btn = document.querySelector(".menu-button");
            if (!menu.contains(e.target) && !btn.contains(e.target)) menu.style.display = "none";
        });
    </script>

    <div class="container">

        <div class="profit-box">
            <select id="yearFilter"></select><span class="profit-label">収支：</span><span id="profit">0円</span>
        </div>

        <table class="summary-table">
            <colgroup>
                <col class="summary-col-label">
                <col class="summary-col-money">
                <col class="summary-col-money">
                <col class="summary-col-money">
            </colgroup>
            <tr>
                <th></th>
                <th>購入</th>
                <th>払戻</th>
                <th>収支</th>
            </tr>

            <tr>
                <td>上田</td>
                <td id="sumUeda"><span>0円</span></td>
                <td id="payUeda"><span>0円</span></td>
                <td id="profitUeda"><span>0円</span></td>
            </tr>

            <tr>
                <td>千葉</td>
                <td id="sumChiba"><span>0円</span></td>
                <td id="payChiba"><span>0円</span></td>
                <td id="profitChiba"><span>0円</span></td>
            </tr>

            <tr>
                <td>合計</td>
                <td id="sumTotal"><span>0円</span></td>
                <td id="sumPayout"><span>0円</span></td>
                <td id="profitTotal"><span>0円</span></td>
            </tr>
        </table>

        <div class="calendar-block">
            <div class="cal-header">
                <button class="cal-nav" type="button" onclick="shiftMonth(-1)">‹</button>
                <button class="cal-title" type="button" id="monthTitle" onclick="openMonthPicker()"></button>
                <button class="cal-nav" type="button" onclick="shiftMonth(1)">›</button>
                <input type="month" id="monthPicker">
            </div>

            <div class="cal-dow">
                <div>月</div>
                <div>火</div>
                <div>水</div>
                <div>木</div>
                <div>金</div>
                <div class="sat">土</div>
                <div class="sun">日</div>
            </div>

            <div class="cal-grid" id="calGrid"></div>
        </div>

        <div class="month-summary">
            <div class="month-summary-label">月間収支</div>
            <div class="month-summary-body">
                <div class="month-profit" id="monthProfit">0円</div>
                <div class="month-side">
                    <div class="ms-row">
                        <div>購入</div>
                        <div class="ms-val" id="monthInvest">0円</div>
                    </div>
                    <div class="ms-row">
                        <div>払戻</div>
                        <div class="ms-val" id="monthRecover">0円</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="day-summary" id="daySummary">
            <div class="day-summary-date" id="daySummaryDate"></div>
            <div class="day-summary-list" id="daySummaryList"></div>
        </div>
    </div>

    <div class="day-editor">
        <div class="day-title" id="dayTitle"></div>
        <div class="day-list" id="dayList"></div>
        <div class="empty-hint" id="dayEmpty" style="display:none;"></div>
    </div>
    </div>

    </div>
    <div class="editor-overlay" id="editorOverlay" aria-hidden="true">
        <div class="editor-top">
            <button class="editor-close" type="button" onclick="closeEditor()">×</button>
            <div class="editor-title" id="editorTitle"></div>
            <button class="editor-save" type="button" onclick="saveEditor()">保存</button>
        </div>

        <div class="editor-body">
            <div class="editor-card">
                <div class="editor-field">
                    <div class="editor-icon invest">購入</div>
                    <input id="editorInvest" class="editor-input" inputmode="numeric" placeholder="購入金額">
                </div>
                <div class="editor-field">
                    <div class="editor-icon recover">払戻</div>
                    <input id="editorRecover" class="editor-input" inputmode="numeric" placeholder="払戻金額">
                </div>
                <div class="editor-field">
                    <div class="editor-icon profit">収支</div>
                    <div class="editor-profit" id="editorProfit">0円</div>
                </div>
            </div>

            <div class="editor-card">
                <div class="editor-field">
                    <div class="editor-icon buyer">買主</div>
                    <div class="buyer-seg" id="buyerSeg">
                        <button type="button" class="buyer-btn active" data-buyer="上田" aria-pressed="true">上田</button>
                        <button type="button" class="buyer-btn" data-buyer="千葉" aria-pressed="false">千葉</button>
                    </div>
                </div>
            </div>

            <button class="editor-delete" id="editorDelete" type="button" onclick="deleteEditor()"
                style="display:none;">削除</button>
        </div>
    </div>

    <div class="page-end-actions">
        <button class="fab-edit" id="fabEdit" type="button" onclick="openEditorFromFab()">✎</button>
    </div>

    <script>
        const API_URL = "https://shushi.cooopew.workers.dev/";

        let rows = [];
        let uidSeq = 1;

        const calGrid = document.getElementById("calGrid");
        const monthTitle = document.getElementById("monthTitle");
        const monthPicker = document.getElementById("monthPicker");
        const dayTitle = document.getElementById("dayTitle");
        const dayList = document.getElementById("dayList");
        const dayEmpty = document.getElementById("dayEmpty");
        const daySummaryDate = document.getElementById("daySummaryDate");
        const daySummaryList = document.getElementById("daySummaryList");
        const editorOverlay = document.getElementById("editorOverlay");
        const editorTitle = document.getElementById("editorTitle");
        const editorInvest = document.getElementById("editorInvest");
        const editorRecover = document.getElementById("editorRecover");
        const editorProfit = document.getElementById("editorProfit");
        const editorDelete = document.getElementById("editorDelete");
        const buyerBtns = Array.from(document.querySelectorAll(".buyer-btn"));
        const fabEdit = document.getElementById("fabEdit");
        const yearFilter = document.getElementById("yearFilter");
        let editorDate = "";
        let editorBuyer = "上田";
        let editingUid = null;
        let editorForceNew = false;
        let lastBuyer = "上田";

        if (editorInvest) editorInvest.addEventListener("input", () => { sanitizeNumberInput(editorInvest); updateEditorProfit(); });
        if (editorRecover) editorRecover.addEventListener("input", () => { sanitizeNumberInput(editorRecover); updateEditorProfit(); });

        buyerBtns.forEach(btn => {
            btn.addEventListener("click", () => setEditorBuyer(btn.dataset.buyer || "上田"));
        });

        let viewMonth = "";
        let selectedDate = "";

        function todayJST() {
            return new Date(Date.now() + 9 * 3600000).toISOString().slice(0, 10);
        }

        function pad2(n) { return String(n).padStart(2, "0"); }

        function ymFromDate(d) { return d && d.length >= 7 ? d.slice(0, 7) : ""; }

        function formatMonthTitle(ym) {
            const y = ym.slice(0, 4);
            const m = String(parseInt(ym.slice(5, 7), 10));
            return `${y}年${m}月`;
        }

        function formatDayLabel(d) {
            if (!d || d.length < 10) return "";
            const mm = Number(d.slice(5, 7));
            const dd = Number(d.slice(8, 10));
            if (!mm || !dd) return "";
            return `${mm}月${dd}日`;
        }

        function formatYen(n) {
            const num = Number(n);
            if (!isFinite(num) || num === 0) return "0円";
            if (num < 0) return "-" + Math.abs(num).toLocaleString() + "円";
            return num.toLocaleString() + "円";
        }

        function formatProfitSpan(n) {
            if (n > 0) return `<span class="profit">${formatYen(n)}</span>`;
            if (n < 0) return `<span class="loss">${formatYen(n)}</span>`;
            return `<span>0円</span>`;
        }

        function parseYen(s) {
            return Number(String(s || "").replace(/[円,]/g, "")) || 0;
        }

        function sanitizeNumberInput(el) {
            el.value = el.value.replace(/[^\d]/g, "");
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, ch => {
                if (ch === "&") return "&amp;";
                if (ch === "<") return "&lt;";
                if (ch === ">") return "&gt;";
                if (ch === '"') return "&quot;";
                return "&#39;";
            });
        }

        function startEdit(el) {
            const v = el.value ? String(parseYen(el.value)) : "";
            el.value = v === "0" ? "" : v;
            el.select();
        }

        function endEdit(el) {
            if (!el.value) return;
            const n = parseYen(el.value);
            el.value = n ? formatYen(n) : "";
        }

        let toastHideTimer = null;
        let toastFadeTimer = null;
        const LOADING_TIMEOUT = 30000;

        function showToast(message, { type = "info", duration = 2000 } = {}) {
            let el = document.querySelector(".ns-toast");
            if (toastHideTimer) { clearTimeout(toastHideTimer); toastHideTimer = null; }
            if (toastFadeTimer) { clearTimeout(toastFadeTimer); toastFadeTimer = null; }

            if (!el) {
                el = document.createElement("div");
                el.className = "ns-toast";
                document.body.appendChild(el);
            }

            el.setAttribute("role", type === "error" ? "alert" : "status");
            el.setAttribute("aria-live", type === "error" ? "assertive" : "polite");

            el.dataset.type = type;
            el.dataset.visible = "0";
            el.textContent = message;

            requestAnimationFrame(() => {
                el.dataset.visible = "1";
            });

            const effectiveDuration = type === "loading" ? LOADING_TIMEOUT : duration;
            toastHideTimer = setTimeout(() => {
                el.dataset.visible = "0";
                toastFadeTimer = setTimeout(() => el.remove(), 200);
            }, effectiveDuration);
        }

        function setDeleteMode(on) {
            const btn = document.getElementById("deleteModeBtn");
            if (!btn) return;
            if (on) {
                document.body.classList.add("delete-mode");
                btn.setAttribute("aria-pressed", "true");
            } else {
                document.body.classList.remove("delete-mode");
                btn.setAttribute("aria-pressed", "false");
            }
        }

        function toggleDeleteMode() {
            const on = !document.body.classList.contains("delete-mode");
            setDeleteMode(on);
        }

        function setViewMonth(ym) {
            viewMonth = ym;
            monthTitle.textContent = formatMonthTitle(ym);
            monthPicker.value = ym;

            if (!selectedDate || ymFromDate(selectedDate) !== ym) {
                const today = todayJST();
                selectedDate = ymFromDate(today) === ym ? today : `${ym}-01`;
            }

            renderAll();
        }

        function openMonthPicker() {
            monthPicker.click();
            monthPicker.focus();
        }

        function shiftMonth(delta) {
            const y = parseInt(viewMonth.slice(0, 4), 10);
            const m = parseInt(viewMonth.slice(5, 7), 10);
            const d = new Date(y, m - 1 + delta, 1);
            setViewMonth(`${d.getFullYear()}-${pad2(d.getMonth() + 1)}`);
        }

        function getRowsInMonth(ym) {
            return rows.filter(r => r.date && r.date.startsWith(ym));
        }

        function rebuildYearOptions() {
            if (!yearFilter) return;

            const years = Array.from(new Set(
                rows
                    .map(r => (r.date || "").slice(0, 4))
                    .filter(y => y && y.length === 4)
            )).sort((a, b) => Number(b) - Number(a));

            const saved = localStorage.getItem("shushi_year_filter") || "all";
            const current = yearFilter.value || saved || "all";

            yearFilter.innerHTML = `<option value="all">全期間</option>` + years.map(y => `<option value="${y}">${y}年</option>`).join("");
            yearFilter.value = (current !== "all" && years.includes(current)) ? current : "all";
        }

        function getYearFilterValue() {
            if (!yearFilter) return "all";
            return yearFilter.value || "all";
        }

        function fitYearFilterWidth() {
            if (!yearFilter) return;

            const opt = yearFilter.options[yearFilter.selectedIndex];
            const text = opt ? opt.text : "";

            let meas = document.getElementById("yearMeasure");
            if (!meas) {
                meas = document.createElement("span");
                meas.id = "yearMeasure";
                meas.style.position = "absolute";
                meas.style.visibility = "hidden";
                meas.style.whiteSpace = "pre";
                meas.style.pointerEvents = "none";
                document.body.appendChild(meas);
            }

            const cs = getComputedStyle(yearFilter);
            meas.style.font = cs.font;
            meas.style.fontWeight = cs.fontWeight;
            meas.textContent = text;

            const w = meas.getBoundingClientRect().width;
            yearFilter.style.width = Math.ceil(w + 2) + "px";
        }

        function applyYearFilter() {
            if (!yearFilter) {
                calc();
                return;
            }

            const y = getYearFilterValue();
            localStorage.setItem("shushi_year_filter", y);
            fitYearFilterWidth();
            calc();
        }

        function calc() {
            const yFilter = getYearFilterValue();
            const baseRows = (yFilter === "all") ? rows : rows.filter(r => (r.date || "").slice(0, 4) === yFilter);

            let sumUeda = 0, sumChiba = 0;
            let payUeda = 0, payChiba = 0;

            baseRows.forEach(r => {
                const amount = Number(r.amount) || 0;
                const payout = Number(r.payout) || 0;
                const buyer = r.buyer || "上田";

                if (buyer === "上田") {
                    sumUeda += amount;
                    payUeda += payout;
                } else {
                    sumChiba += amount;
                    payChiba += payout;
                }
            });

            const sumTotal = sumUeda + sumChiba;
            const sumPayout = payUeda + payChiba;
            const profit = sumPayout - sumTotal;

            const profitUeda = payUeda - sumUeda;
            const profitChiba = payChiba - sumChiba;

            const su = document.getElementById("sumUeda");
            if (su) su.innerHTML = `<span>${formatYen(sumUeda)}</span>`;
            const pueda = document.getElementById("payUeda");
            if (pueda) pueda.innerHTML = `<span>${formatYen(payUeda)}</span>`;
            const sc = document.getElementById("sumChiba");
            if (sc) sc.innerHTML = `<span>${formatYen(sumChiba)}</span>`;
            const pchiba = document.getElementById("payChiba");
            if (pchiba) pchiba.innerHTML = `<span>${formatYen(payChiba)}</span>`;
            const st = document.getElementById("sumTotal");
            if (st) st.innerHTML = `<span>${formatYen(sumTotal)}</span>`;
            const sp = document.getElementById("sumPayout");
            if (sp) sp.innerHTML = `<span>${formatYen(sumPayout)}</span>`;

            const pu = document.getElementById("profitUeda");
            if (pu) pu.innerHTML = formatProfitSpan(profitUeda);
            const pc = document.getElementById("profitChiba");
            if (pc) pc.innerHTML = formatProfitSpan(profitChiba);
            const pt = document.getElementById("profitTotal");
            if (pt) pt.innerHTML = formatProfitSpan(profit);

            const profitElem = document.getElementById("profit");
            if (profitElem) {
                if (profit > 0) profitElem.innerHTML = `<span class="profit">${formatYen(profit)}</span>`;
                else if (profit < 0) profitElem.innerHTML = `<span class="loss">${formatYen(profit)}</span>`;
                else profitElem.innerHTML = `<span>0円</span>`;
            }

            const monthRows = getRowsInMonth(viewMonth);
            let monthInvest = 0;
            let monthRecover = 0;

            monthRows.forEach(r => {
                monthInvest += Number(r.amount) || 0;
                monthRecover += Number(r.payout) || 0;
            });

            const monthProfit = monthRecover - monthInvest;

            const mp = document.getElementById("monthProfit");
            const mi = document.getElementById("monthInvest");
            const mr = document.getElementById("monthRecover");

            if (mp) {
                mp.textContent = formatYen(monthProfit);
                mp.classList.toggle("loss", monthProfit < 0);
                mp.classList.toggle("profit", monthProfit > 0);
                if (monthProfit === 0) { mp.classList.remove("loss"); mp.classList.remove("profit"); }
            }
            if (mi) mi.textContent = formatYen(monthInvest);
            if (mr) mr.textContent = formatYen(monthRecover);

            updateDaySummary();
        }

        function updateDaySummary() {
            if (!daySummaryDate || !daySummaryList) return;
            if (!selectedDate) {
                daySummaryDate.textContent = "";
                daySummaryList.innerHTML = "";
                return;
            }

            const dayRows = rows
                .filter(r => r.date === selectedDate)
                .sort((a, b) => (a.uid || 0) - (b.uid || 0));

            daySummaryDate.textContent = formatDayLabel(selectedDate);

            if (dayRows.length === 0) {
                daySummaryList.innerHTML = "";
                return;
            }

            daySummaryList.innerHTML = dayRows.map(r => {
                const invest = Number(r.amount) || 0;
                const recover = Number(r.payout) || 0;
                const profit = recover - invest;
                const buyer = r.buyer || "上田";
                const profitClass = profit > 0 ? "profit" : (profit < 0 ? "loss" : "");
                return `
                    <div class="day-summary-entry" data-uid="${r.uid}">
                        <div class="day-entry-profit ${profitClass}">${formatYen(profit)}</div>
                        <div class="day-entry-side">
                            <div class="ms-row">
                                <div>購入</div>
                                <div class="ms-val">${formatYen(invest)}</div>
                            </div>
                            <div class="ms-row">
                                <div>払戻</div>
                                <div class="ms-val">${formatYen(recover)}</div>
                            </div>
                            <div class="ms-row">
                                <div>買主</div>
                                <div class="ms-val">${escapeHtml(buyer)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderCalendar() {
            const y = parseInt(viewMonth.slice(0, 4), 10);
            const m = parseInt(viewMonth.slice(5, 7), 10);
            const first = new Date(y, m - 1, 1);
            const lastDay = new Date(y, m, 0).getDate();

            const offsetMon = (first.getDay() + 6) % 7;

            const monthRows = getRowsInMonth(viewMonth);
            const profitByDate = new Map();
            const countByDate = new Map();

            monthRows.forEach(r => {
                if (!r.date) return;
                const amount = Number(r.amount) || 0;
                const payout = Number(r.payout) || 0;
                const p = payout - amount;

                profitByDate.set(r.date, (profitByDate.get(r.date) || 0) + p);
                countByDate.set(r.date, (countByDate.get(r.date) || 0) + 1);
            });

            const totalSlots = offsetMon + lastDay;
            const weeks = Math.ceil(totalSlots / 7);
            const cellCount = weeks * 7;

            const cells = [];
            for (let i = 0; i < cellCount; i++) {
                const day = i - offsetMon + 1;

                if (day < 1 || day > lastDay) {
                    cells.push(`<div class="cal-cell outside"></div>`);
                    continue;
                }

                const dateStr = `${viewMonth}-${pad2(day)}`;
                const dow = new Date(y, m - 1, day).getDay();
                const weekClass = dow === 0 ? " sun" : (dow === 6 ? " sat" : "");
                const p = profitByDate.get(dateStr);
                const c = countByDate.get(dateStr) || 0;

                const isSel = dateStr === selectedDate;
                const amt = c ? formatYen(p) : "";
                const amtClass = c ? (p < 0 ? "neg" : (p > 0 ? "pos" : "")) : "";
                const selectedClass = isSel ? " selected" : "";

                cells.push(
                    `<div class="cal-cell${weekClass}${selectedClass}" data-date="${dateStr}">
                                <div class="cal-dayline">
                                    <div class="cal-daynum"><span class="cal-daychip">${day}</span></div>
                                </div>
                                ${c ? `<div class="cal-amt ${amtClass}">${amt}</div>` : ``}
                            </div>`
                );
            }

            calGrid.innerHTML = cells.join("");
        }

        function renderDayEditor() {
            dayTitle.textContent = selectedDate ? selectedDate : "";
            const list = rows
                .filter(r => r.date === selectedDate)
                .sort((a, b) => (a.uid || 0) - (b.uid || 0));

            if (list.length === 0) {
                dayList.innerHTML = "";
                dayEmpty.style.display = "";
                return;
            }

            dayEmpty.style.display = "none";
            dayList.innerHTML = list.map(r => {
                const amount = (Number(r.amount) || 0) ? formatYen(r.amount) : "";
                const payout = (Number(r.payout) || 0) ? formatYen(r.payout) : "";
                const buyer = r.buyer || "上田";

                return `
                            <div class="entry-row" data-uid="${r.uid}">
                                <input class="entry-date" type="date" value="${r.date}">
                                <input class="entry-amount" type="text" inputmode="numeric" value="${amount}">
                                <input class="entry-payout" type="text" inputmode="numeric" value="${payout}">
                                <select class="entry-buyer">
                                    <option value="上田" ${buyer === "上田" ? "selected" : ""}>上田</option>
                                    <option value="千葉" ${buyer === "千葉" ? "selected" : ""}>千葉</option>
                                </select>
                                <button class="delete-btn entry-delete" type="button">×</button>
                            </div>
                        `;
            }).join("");
        }

        function renderAll() {
            renderCalendar();
            calc();
        }

        function ensureSelectedInMonth() {
            if (!selectedDate) return;
            const ym = ymFromDate(selectedDate);
            if (ym && ym !== viewMonth) setViewMonth(ym);
        }

        function formatEditorTitle(d, isEdit) {
            if (!d || d.length < 10) return "";
            const mm = Number(d.slice(5, 7));
            const dd = Number(d.slice(8, 10));
            const s = `${mm}月${dd}日の収支を${isEdit ? "編集" : "入力"}`;
            return s;
        }

        function setEditorBuyer(b) {
            editorBuyer = b || "上田";
            lastBuyer = editorBuyer;
            if (editingUid && !editorForceNew) {
                editingUid = null;
            }
            buyerBtns.forEach(x => {
                const on = (x.dataset.buyer || "上田") === editorBuyer;
                x.classList.toggle("active", on);
                x.setAttribute("aria-pressed", on ? "true" : "false");
            });
            loadEditorState();
        }

        function openEditor(d, options = {}) {
            const { buyer, uid, forceNew = false } = options;
            editorDate = d;
            editorForceNew = !!forceNew;
            editingUid = uid ?? null;
            if (buyer) editorBuyer = buyer;
            if (!editorBuyer) editorBuyer = lastBuyer || "上田";
            if (editingUid != null) {
                const row = rows.find(r => String(r.uid) === String(editingUid));
                if (row && row.buyer) editorBuyer = row.buyer;
            }
            buyerBtns.forEach(x => x.classList.toggle("active", (x.dataset.buyer || "上田") === editorBuyer));
            loadEditorState();
            if (editorOverlay) {
                editorOverlay.classList.add("show");
                editorOverlay.setAttribute("aria-hidden", "false");
            }
            document.body.classList.add("editor-open");
        }

        function closeEditor() {
            if (editorOverlay) {
                editorOverlay.classList.remove("show");
                editorOverlay.setAttribute("aria-hidden", "true");
            }
            document.body.classList.remove("editor-open");
        }

        function loadEditorState() {
            const row = editingUid != null
                ? rows.find(r => String(r.uid) === String(editingUid))
                : (editorForceNew ? null : rows.find(r => r.date === editorDate && (r.buyer || "上田") === editorBuyer));
            editingUid = row ? row.uid : null;

            if (editorInvest) editorInvest.value = row && row.amount != null && row.amount !== 0 ? String(row.amount).replace(/[^\d]/g, "") : "";
            if (editorRecover) editorRecover.value = row && row.payout != null && row.payout !== 0 ? String(row.payout).replace(/[^\d]/g, "") : "";

            const isEdit = !!row;
            if (editorTitle) editorTitle.textContent = formatEditorTitle(editorDate, isEdit);
            if (editorDelete) editorDelete.style.display = isEdit ? "block" : "none";

            updateEditorProfit();
        }

        function updateEditorProfit() {
            const a = editorInvest ? Number(editorInvest.value) || 0 : 0;
            const p = editorRecover ? Number(editorRecover.value) || 0 : 0;
            const diff = p - a;

            if (!editorProfit) return;
            editorProfit.textContent = formatYen(diff);
            editorProfit.classList.remove("pos", "neg");
            if (diff > 0) editorProfit.classList.add("pos");
            if (diff < 0) editorProfit.classList.add("neg");
        }

        async function saveEditor() {
            if (!editorDate) return;

            const a = editorInvest ? Number(editorInvest.value) || 0 : 0;
            const p = editorRecover ? Number(editorRecover.value) || 0 : 0;

            const existing = editingUid != null
                ? rows.find(r => String(r.uid) === String(editingUid))
                : (editorForceNew ? null : rows.find(r => r.date === editorDate && (r.buyer || "上田") === editorBuyer));
            if (existing) {
                existing.amount = a ? String(a) : "";
                existing.payout = p ? String(p) : "";
                existing.buyer = editorBuyer || "上田";
            } else {
                rows.push({
                    uid: uidSeq++,
                    date: editorDate,
                    amount: a ? String(a) : "",
                    payout: p ? String(p) : "",
                    buyer: editorBuyer || "上田"
                });
            }

            calc();
            renderCalendar();


            rebuildYearOptions();
            applyYearFilter();

            const ok = await saveData();
            if (ok) closeEditor();
        }

        async function deleteEditor() {
            const row = editingUid != null
                ? rows.find(r => String(r.uid) === String(editingUid))
                : rows.find(r => r.date === editorDate && (r.buyer || "上田") === editorBuyer);
            if (!row) return;

            rows = rows.filter(x => x.uid !== row.uid);

            calc();
            renderCalendar();


            rebuildYearOptions();
            applyYearFilter();

            const ok = await saveData({ message: "削除しました" });
            if (ok) closeEditor();
        }

        function openEditorFromFab() {
            const today = todayJST();
            const d = selectedDate || (ymFromDate(today) === viewMonth ? today : (viewMonth ? `${viewMonth}-01` : today));
            selectedDate = d;
            ensureSelectedInMonth();
            renderCalendar();
            openEditor(d, { forceNew: true });
        }

        function addRow() {
            const today = todayJST();
            const d = selectedDate || (ymFromDate(today) === viewMonth ? today : (viewMonth ? `${viewMonth}-01` : today));
            selectedDate = d;
            ensureSelectedInMonth();
            renderCalendar();
            openEditor(d, { forceNew: true });
        }

        function removeRow(uid) {
            rows = rows.filter(r => String(r.uid) !== String(uid));
            renderAll();
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                uidSeq = 1;
                rows = (Array.isArray(data) ? data : []).map(r => ({
                    uid: uidSeq++,
                    date: r.date || "",
                    amount: r.amount ?? "",
                    payout: r.payout ?? "",
                    buyer: r.buyer || "上田"
                }));

                rebuildYearOptions();

                const today = todayJST();
                const todayYm = today.slice(0, 7);
                selectedDate = today;
                setViewMonth(todayYm);

                applyYearFilter();
            } catch (e) {
                showToast("読み込みに失敗しました");
                const todayYm = todayJST().slice(0, 7);
                setViewMonth(todayYm);
            }
        }

        async function saveData({ message = "保存しました" } = {}) {
            const payload = rows.map(r => ({
                date: r.date,
                amount: Number(r.amount) || 0,
                payout: Number(r.payout) || 0,
                buyer: r.buyer || "上田"
            }));

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                showToast(message);
                return true;
            } catch {
                showToast("保存に失敗しました");
                return false;
            }
        }

        calGrid.addEventListener("click", e => {
            const cell = e.target.closest(".cal-cell");
            if (!cell || cell.classList.contains("outside")) return;
            const d = cell.dataset.date;
            if (!d) return;
            selectedDate = d;
            renderCalendar();
            updateDaySummary();
        });

        daySummaryList.addEventListener("click", e => {
            const entry = e.target.closest(".day-summary-entry");
            if (!entry) return;
            const uid = entry.dataset.uid;
            const row = rows.find(r => String(r.uid) === String(uid));
            if (!row) return;
            selectedDate = row.date;
            ensureSelectedInMonth();
            renderCalendar();
            openEditor(row.date, { uid: row.uid, buyer: row.buyer, forceNew: false });
        });

        dayList.addEventListener("focusin", e => {
            const t = e.target;
            if (t && (t.classList.contains("entry-amount") || t.classList.contains("entry-payout"))) startEdit(t);
        });

        dayList.addEventListener("input", e => {
            const t = e.target;
            const rowEl = t && t.closest(".entry-row");
            if (!t || !rowEl) return;

            const uid = rowEl.dataset.uid;
            const r = rows.find(x => String(x.uid) === String(uid));
            if (!r) return;

            if (t.classList.contains("entry-amount")) {
                sanitizeNumberInput(t);
                r.amount = t.value ? parseYen(t.value) : "";
                calc();
                renderCalendar();
                return;
            }

            if (t.classList.contains("entry-payout")) {
                sanitizeNumberInput(t);
                r.payout = t.value ? parseYen(t.value) : "";
                calc();
                renderCalendar();
                return;
            }
        });

        dayList.addEventListener("focusout", e => {
            const t = e.target;
            if (!t) return;
            if (t.classList.contains("entry-amount") || t.classList.contains("entry-payout")) endEdit(t);
        });

        dayList.addEventListener("change", e => {
            const t = e.target;
            const rowEl = t && t.closest(".entry-row");
            if (!t || !rowEl) return;

            const uid = rowEl.dataset.uid;
            const r = rows.find(x => String(x.uid) === String(uid));
            if (!r) return;

            if (t.classList.contains("entry-date")) {
                r.date = t.value || r.date;
                selectedDate = r.date;
                ensureSelectedInMonth();
                renderAll();
                return;
            }

            if (t.classList.contains("entry-buyer")) {
                r.buyer = t.value;
                calc();
                renderCalendar();
                return;
            }
        });

        dayList.addEventListener("click", e => {
            const btn = e.target.closest(".entry-delete");
            if (!btn) return;
            if (!document.body.classList.contains("delete-mode")) return;
            const rowEl = btn.closest(".entry-row");
            if (!rowEl) return;
            removeRow(rowEl.dataset.uid);
        });

        monthPicker.addEventListener("change", () => {
            if (!monthPicker.value) return;
            setViewMonth(monthPicker.value);
        });

        if (yearFilter) yearFilter.addEventListener("change", () => applyYearFilter());
        setDeleteMode(false);
        loadData();
    </script>

</body>

</html>
