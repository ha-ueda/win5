            if (modal) modal.style.display = "none";
            document.body.style.overflow = "";
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (e) {
                try {
                    const ta = document.createElement("textarea");
                    ta.value = text;
                    ta.style.cssText = "position:fixed;opacity:0";
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    const ok = document.execCommand("copy");
                    document.body.removeChild(ta);
                    return ok;
                } catch (e2) {
                    return false;
                }
            }
        }

        async function copyShareUrl() {
            if (!currentShareUrl) return;
            const ok = await copyToClipboard(currentShareUrl);
            if (ok) showToast("コピーしました");
        }

        function hasExistingMarks() {
            return Array.from(document.querySelectorAll(".custom-select:not(.is-empty):not(.is-scratched)")).some(sel => {
                const box = sel.querySelector(".selected");
                if (!box) return false;
                const mark = (box.textContent || "").trim();
                const bg = (box.dataset.bg || "none").trim();
                return mark || (bg && bg !== "none");
            });
        }

        async function importShareText() {
            let token = null;

            try {
                const clip = (await navigator.clipboard.readText()) || "";
                const t = extractShareToken(clip.trim());
                if (t) token = t;
            } catch (e) { }

            if (!token) {
                showToast("共有URLがありません", { type: "error" });
                return;
            }

            if (hasExistingMarks()) {
                if (!confirm("現在の印が上書きされます。よろしいですか？")) return;
            }

            try {
                const payload = decodeSharePayload(token);
                applySharePayload(payload);
                closeShare();
                showToast("読み込みました");
            } catch (e) {
                showToast("読み込み失敗", { type: "error" });
            }
        }

        function extractShareToken(txt) {
            const t = (txt || "").trim();
            const m = t.match(/[?#&]share=([A-Za-z0-9\-_]+)/);
            if (m) return m[1];
            if (/^[A-Za-z0-9\-_]{4,}$/.test(t)) return t;
            return null;
        }

        function buildSharePayload() {
            const items = [];
            let hasBgMeta = false;
            document.querySelectorAll(".custom-select").forEach(sel => {
                if (sel.classList.contains("is-empty")) return;
                if (sel.classList.contains("is-scratched")) return;
                const r = Number(sel.dataset.race);
                const h = Number(sel.dataset.horse);
                const box = sel.querySelector(".selected");
                const mark = (box?.textContent || "").trim();
                const bg = (box?.dataset.bg || "none").trim();
                const bgSource = (box?.dataset.bgSource || "").trim();
                const manualBg = (box?.dataset.manualBg || "").trim();
                const ruleBg = (box?.dataset.ruleBg || "").trim();
                const bgRuleDetails = (box?.dataset.bgRuleDetails || "").trim();

                if (mark || (bg && bg !== "none")) {
                    if (bg && bg !== "none") {
                        hasBgMeta = true;
                        items.push([r, h, mark, bg, bgSource, manualBg, ruleBg, bgRuleDetails]);
                    } else {
                        items.push([r, h, mark, bg]);
                    }
                }
            });
            if (hasBgMeta) {
                return {
                    v: 2,
                    bgRuleKeys: [...selectedBgRuleKeys],
                    bgRuleColors: { ...bgRuleColors },
                    items
                };
            }
            return { v: 1, items };
        }

        function normalizeSharedBgRuleDetails(value) {
            if (!value) return "";
            try {
                const rows = typeof value === "string" ? JSON.parse(value) : value;
                if (!Array.isArray(rows)) return "";
                const normalized = rows.slice(0, 20).map(item => {
                    const color = normalizeBgColors(item?.color || "")[0] || "";
                    return {
                        label: String(item?.label || "").trim().slice(0, 80),
                        probability: String(item?.probability || "").trim().slice(0, 40),
                        color
                    };
                }).filter(item => item.label || item.color);
                return normalized.length ? JSON.stringify(normalized) : "";
            } catch {
                return "";
            }
        }

        function normalizeShareItem(it, version = 1) {
            if (!Array.isArray(it) || it.length < 4) return null;
            const r = Number(it[0]);
            const h = Number(it[1]);
            if (!Number.isInteger(r) || !Number.isInteger(h) || r < 1 || r > TOTAL_RACES || h < 1 || h > HORSE_MAX) return null;

            const mark = String(it[2] ?? "").trim();
            if (!MARKS.includes(mark)) return null;

            const bg = serializeBg(it[3] ?? "none");
            if (version !== 2) return { r, h, mark, bg };

            const rawSource = String(it[4] ?? "").trim();
            const bgSource = ["manual", "rule", "mixed"].includes(rawSource) ? rawSource : "";
            const manualBg = serializeBg(it[5] ?? "");
            const ruleBg = serializeBg(it[6] ?? "");
            const bgRuleDetails = normalizeSharedBgRuleDetails(it[7] ?? "");
            return { r, h, mark, bg, bgSource, manualBg, ruleBg, bgRuleDetails };
        }

        function normalizeSharePayload(payload) {
            if (!payload || (payload.v !== 1 && payload.v !== 2) || !Array.isArray(payload.items)) return null;
            const items = [];
            const seen = new Set();

            for (const it of payload.items) {
                const normalized = normalizeShareItem(it, payload.v);
                if (!normalized) return null;
                const key = `${normalized.r}:${normalized.h}`;
                if (seen.has(key)) return null;
                seen.add(key);
                items.push(normalized);
            }

            const validRuleKeys = new Set(BACKGROUND_RULES.filter(isEnabledBackgroundRule).map(rule => rule.key));
            const bgRuleKeys = payload.v === 2 && Array.isArray(payload.bgRuleKeys)
                ? payload.bgRuleKeys
                    .map(key => String(key || "").trim())
                    .filter(key => validRuleKeys.has(key))
                : null;
            const normalizedBgRuleColors = {};
            if (payload.v === 2 && payload.bgRuleColors && typeof payload.bgRuleColors === "object") {
                for (const rule of BACKGROUND_RULES) {
                    const saved = payload.bgRuleColors[rule.key];
                    if (BG_RULE_COLOR_PALETTE.includes(saved)) normalizedBgRuleColors[rule.key] = saved;
                }
            }

            return {
                v: payload.v,
                bgRuleKeys,
                bgRuleColors: normalizedBgRuleColors,
                items
            };
        }

        function applySharePayload(payload) {
            const normalizedPayload = normalizeSharePayload(payload);
            if (!normalizedPayload) throw new Error("Invalid share payload");

            document.querySelectorAll(".custom-select").forEach(sel => {
                const box = sel.querySelector(".selected");
                if (!box) return;
                box.textContent = "";
                box.dataset.bg = "none";
                box.dataset.bgSource = "";
                box.dataset.manualBg = "";
                box.dataset.ruleBg = "";
                box.dataset.bgRuleDetails = "";
                applyMarkBackground(sel, false);
                applyBg(sel, "none");
            });

            if (normalizedPayload.v === 2) {
                if (Array.isArray(normalizedPayload.bgRuleKeys)) {
                    selectedBgRuleKeys = new Set(normalizedPayload.bgRuleKeys);
                }
                if (normalizedPayload.bgRuleColors && Object.keys(normalizedPayload.bgRuleColors).length) {
                    bgRuleColors = { ...bgRuleColors, ...normalizedPayload.bgRuleColors };
                    ensureUniqueBgRuleColors();
                }
                renderBgRuleList();
            }

            for (const it of normalizedPayload.items) {
                const sel = document.querySelector(`.custom-select[data-race="${it.r}"][data-horse="${it.h}"]`);
                if (!sel || sel.classList.contains("is-empty") || sel.classList.contains("is-scratched")) continue;

                const box = sel.querySelector(".selected");
                if (!box) continue;

                const m = (it.mark || "").toString();
                const b = (it.bg || "none").toString();

                box.textContent = m;
                applyMarkBackground(sel, !!m);

                if (normalizedPayload.v === 2) {
                    box.dataset.bgSource = it.bgSource || "";
                    box.dataset.manualBg = it.manualBg || "";
                    box.dataset.ruleBg = it.ruleBg || "";
                    box.dataset.bgRuleDetails = normalizeSharedBgRuleDetails(filterBgRuleDetailsToSelectedRules(
                        it.bgRuleDetails ? JSON.parse(it.bgRuleDetails) : []
                    ));
                    if (b !== "none" && !normalizeBgColors(box.dataset.manualBg).length && !normalizeBgColors(box.dataset.ruleBg).length) {
                        box.dataset.manualBg = b;
                    }
                    syncEffectiveRowBackground(sel);
                } else {
                    setRowBackground(sel, b, b === "none" ? "" : "manual");
                }
            }

            saveState();
        }

        function parseShareHexColor(color) {
            const m = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.exec(String(color || "").trim());
            if (!m) return null;
            const hex = m[1].length === 3
                ? m[1].split("").map(ch => ch + ch).join("")
                : m[1];
            return {
                color: `#${hex.toLowerCase()}`,
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16),
            };
        }

        function getShareKnownColors() {
            return [...new Set(SHARE_COLOR_TABLE_V1.map(c => {
                const parsed = parseShareHexColor(c);
                return parsed ? parsed.color : String(c || "").toLowerCase();
            }))];
        }

        function makeShareToken(prefix, bytes) {
            let bin = "";
            for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
            const b64 = btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
            return prefix + b64;
        }

        function encodeSharePayloadV2(obj, fallback) {
            if (!obj || obj.v !== 2 || !Array.isArray(obj.items) || obj.items.length === 0) return fallback();
            const markToId = (m) => {
                if (m === "") return 0;
                if (m === "✓") return 1;
                if (m === "◎") return 2;
                return null;
            };
            const knownColorToId = new Map(getShareKnownColors().map((color, i) => [color, i]));
            const ruleKeyToBit = new Map(BACKGROUND_RULES.map((rule, index) => [rule.key, index]));
            let selectedRuleMask = 0;
            (obj.bgRuleKeys || []).forEach(key => {
                const bit = ruleKeyToBit.get(key);
                if (bit !== undefined && bit < 8) selectedRuleMask |= 1 << bit;
            });

            const fixedRules = BACKGROUND_RULES.filter(isFixedColorRule);
            const fixedRuleColorIds = fixedRules.map(rule => {
                const parsed = parseShareHexColor(obj.bgRuleColors?.[rule.key] || getBgRuleColor(rule));
                if (!parsed) return null;
                const id = knownColorToId.get(parsed.color);
                return id === undefined || id > 63 ? null : id;
            });
            if (fixedRuleColorIds.some(id => id === null)) return fallback();

            const selectedMask = new Array(12).fill(0);
            const itemByPos = new Map();
            const colorSet = new Set();
            const addColor = (color) => {
                const parsed = parseShareHexColor(color);
                if (!parsed) return null;
                colorSet.add(parsed.color);
                return parsed.color;
            };

            for (const it of obj.items) {
                if (!Array.isArray(it) || it.length < 4) continue;
                const r = Number(it[0]);
                const h = Number(it[1]);
                if (!Number.isFinite(r) || !Number.isFinite(h) || r < 1 || r > TOTAL_RACES || h < 1 || h > HORSE_MAX) return fallback();
                const mid = markToId(String(it[2] ?? "").trim());
                if (mid === null) return fallback();
                const manualColors = normalizeBgColors(it[5] || "");
                const ruleColors = normalizeBgColors(it[6] || "");
                const fallbackColors = normalizeBgColors(it[3] || "");
                const normalizedManualColors = manualColors.length || ruleColors.length ? manualColors : fallbackColors;
                const normalizedRuleColors = ruleColors;
                const detailRules = (() => {
                    try {
                        const details = typeof it[7] === "string" ? JSON.parse(it[7]) : it[7];
                        if (!Array.isArray(details)) return [];
                        return details.flatMap((detail, detailIndex) => {
                            const label = String(detail?.label || "").trim();
                            const index = BACKGROUND_RULES.findIndex(rule => isEnabledBackgroundRule(rule) && rule.label === label);
                            const sourceColor = normalizedRuleColors[detailIndex] || detail?.color || "";
                            const color = addColor(sourceColor);
                            if (index >= 0 && index < 8 && color && (selectedRuleMask & (1 << index))) {
                                return [{ ruleIndex: index, color }];
                            }
                            return [];
                        });
                    } catch {
                        return [];
                    }
                })();
                const pos = ((r - 1) * HORSE_MAX) + (h - 1);
                selectedMask[pos >> 3] |= 1 << (pos & 7);
                const item = { mid, detailRules, manualColors: [], ruleColors: [] };
                for (const color of normalizedManualColors) {
                    const normalized = addColor(color);
                    if (!normalized) return fallback();
                    item.manualColors.push(normalized);
                }
                for (const color of normalizedRuleColors) {
                    const normalized = addColor(color);
                    if (!normalized) return fallback();
                    item.ruleColors.push(normalized);
                }
                itemByPos.set(pos, item);
            }

            const positions = [];
            for (let pos = 0; pos < TOTAL_RACES * HORSE_MAX; pos++) {
                if (selectedMask[pos >> 3] & (1 << (pos & 7))) positions.push(pos);
            }
            if (!positions.length) return fallback();

            const markBytes = new Array(Math.ceil((positions.length * 2) / 8)).fill(0);
            positions.forEach((pos, index) => {
                const bit = index * 2;
                markBytes[bit >> 3] |= (itemByPos.get(pos)?.mid || 0) << (bit & 7);
            });
            const colorList = [...colorSet];
            if (colorList.length > 63) return fallback();
            const colorToIndex = new Map(colorList.map((color, index) => [color, index]));
            const maskSize = Math.ceil(positions.length / 8);
            const detailRuleEntries = positions
                .map((pos, index) => ({ index, details: itemByPos.get(pos)?.detailRules || [] }))
                .filter(item => item.details.length);
            const detailBytes = detailRuleEntries.length
                ? [
                    3,
                    detailRuleEntries.length & 0xff,
                    ...detailRuleEntries.flatMap(item => [
                        item.index & 0xff,
                        item.details.length & 0xff,
                        ...item.details.flatMap(detail => [
                            detail.ruleIndex & 0xff,
                            colorToIndex.get(detail.color) ?? 0
                        ])
                    ])
                ]
                : [0];
            const bytes = [selectedRuleMask & 0xff, fixedRuleColorIds.length & 0xff, ...fixedRuleColorIds, ...selectedMask, ...markBytes, ...detailBytes, colorList.length & 0x3f];

            for (const color of colorList) {
                const knownId = knownColorToId.get(color);
                if (knownId !== undefined && knownId !== null && knownId <= 63) {
                    bytes.push(knownId & 0x3f);
                } else {
                    const parsed = parseShareHexColor(color);
                    if (!parsed) return fallback();
                    bytes.push(0x80, parsed.r, parsed.g, parsed.b);
                }

                const manualMask = new Array(maskSize).fill(0);
                const ruleMask = new Array(maskSize).fill(0);
                positions.forEach((pos, index) => {
                    const item = itemByPos.get(pos);
                    if (item?.manualColors?.includes(color)) manualMask[index >> 3] |= 1 << (index & 7);
                    if (item?.ruleColors?.includes(color)) ruleMask[index >> 3] |= 1 << (index & 7);
                });
                bytes.push(...manualMask, ...ruleMask);
            }

            return makeShareToken("A", bytes);
        }

        function encodeSharePayload(obj) {
            const legacy = () => {
                const json = JSON.stringify(obj);
                const b64 = btoa(unescape(encodeURIComponent(json)));
                return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
            };

            if (obj?.v === 2) return encodeSharePayloadV2(obj, legacy);
            if (!obj || obj.v !== 1 || !Array.isArray(obj.items) || obj.items.length === 0) return legacy();

            const legacyMaskColors = BG_COLORS.slice(0, 7);
            const colorToId = new Map();
            for (let i = 0; i < legacyMaskColors.length; i++) colorToId.set(legacyMaskColors[i], i + 1);

            const markToId = (m) => {
                if (m === "") return 0;
                if (m === "✓") return 1;
                if (m === "◎") return 2;
                return null;
            };

            const parseHexColor = parseShareHexColor;
            const shareKnownColors = getShareKnownColors();
            const knownColorToId = new Map(shareKnownColors.map((color, i) => [color, i]));

            const makeToken = makeShareToken;

            const setBit = (bytes, index) => {
                bytes[index >> 3] |= 1 << (index & 7);
            };

            const encodedItems = [];
            let needsMaskFormat = false;
            let needsPaletteFormat = false;
            let canUseKnownColorFormat = true;
            let canUseSetFormat = true;
            const palette = [];
            const paletteIndex = new Map();

            const addPaletteColor = (color) => {
                const parsed = parseHexColor(color);
                if (!parsed) return null;
                if (!paletteIndex.has(parsed.color)) {
                    if (palette.length >= 32) return null;
                    paletteIndex.set(parsed.color, palette.length);
                    palette.push(parsed);
                }
                return paletteIndex.get(parsed.color);
            };

            for (const it of obj.items) {
                if (!Array.isArray(it) || it.length < 4) continue;
                const r = Number(it[0]);
                const h = Number(it[1]);
                const mark = String(it[2] ?? "").trim();
                const bg = String(it[3] ?? "none").trim();

                if (!Number.isFinite(r) || !Number.isFinite(h) || r < 1 || r > 5 || h < 1 || h > 18) return legacy();

                const mid = markToId(mark);
                if (mid === null) return legacy();

                let bid = 0;
                let mask = 0;
                let paletteMask = 0;
                const colors = (bg && bg !== "none") ? normalizeBgColors(bg) : [];
                if (bg && bg !== "none" && colors.length === 0) return legacy();
                const knownColorIds = [];
                const itemColors = [];

                for (const color of colors) {
                    const parsed = parseHexColor(color);
                    if (!parsed) canUseSetFormat = false;
                    const normalizedColor = parsed ? parsed.color : String(color || "").toLowerCase();
                    itemColors.push(normalizedColor);

                    const got = colorToId.get(color);
                    if (got) {
                        if (bid === 0) bid = got;
                        mask |= 1 << (got - 1);
                    } else {
                        needsPaletteFormat = true;
                    }

                    const paletteId = addPaletteColor(color);
                    if (paletteId === null) return legacy();
                    paletteMask |= 1 << paletteId;

                    const knownId = parsed ? knownColorToId.get(parsed.color) : null;
                    if (knownId === undefined || knownId === null || knownId > 63) {
                        canUseKnownColorFormat = false;
                    } else {
                        knownColorIds.push(knownId);
                    }
                }

        function applyShareFromURL() {
            const hash = location.hash || "";
            const m = hash.match(/share=([A-Za-z0-9\-_]+)/);
            if (!m) return;

            if (hasExistingMarks() && !confirm("現在の印が上書きされます。共有内容を読み込みますか？")) {
                const base = location.href.split("#")[0];
                history.replaceState(null, "", base);
                return;
            }

            try {
                const payload = decodeSharePayload(m[1]);
                applySharePayload(payload);
                const base = location.href.split("#")[0];
                history.replaceState(null, "", base);
            } catch (e) { }
        }

        function clearAllMarks() {
            document.querySelectorAll('.custom-select:not(.is-empty):not(.is-scratched)').forEach(sel => {
                const box = sel.querySelector('.selected');
                if (box) {
                    box.textContent = "";
                    box.dataset.bg = "none";
                    box.dataset.bgSource = "";
                    box.dataset.manualBg = "";
                    box.dataset.ruleBg = "";
                    box.dataset.bgRuleDetails = "";
                }
                applyMarkBackground(sel, false);
                applyBg(sel, "none");
            });
            saveState();
        }

        let currentSortKey = 'no';
        const sortToggleEl = document.getElementById("sortToggle");
        const sortOptions = sortToggleEl.querySelectorAll(".sort-option");

        function sortAllRaces(key) {
            for (let r = 1; r <= TOTAL_RACES; r++) {
                sortRaceTable(r, key, 1);
                sortStateByRace[r] = { key, dir: 1 };
            }
        }

        sortToggleEl.addEventListener("click", (e) => {
            const opt = e.target.closest(".sort-option");
            if (!opt || opt.dataset.key === currentSortKey) return;
            currentSortKey = opt.dataset.key;
            sortAllRaces(currentSortKey);
            sortOptions.forEach(o => o.classList.toggle('active', o.dataset.key === currentSortKey));
            saveState();
        });

        function isMobileLayout() {
            return window.matchMedia("(max-width: 640px)").matches;
        }

        function applyRaceFocus(v) {
            const b = document.body;
            const s = String(v || "all");
            if (s === "all") {
                b.removeAttribute("data-focus-race");
            } else {
                b.setAttribute("data-focus-race", s);
            }
        }

        function fitWithScale(container, inner) {
            if (!container || !inner) return 1;
            inner.style.transform = "none";
            container.style.height = "";
            const innerW = inner.scrollWidth;
            const containerW = container.clientWidth;
            if (innerW > containerW && containerW > 0) {
                const s = containerW / innerW;
                inner.style.transform = "scale(" + s + ")";
                container.style.height = (inner.offsetHeight * s) + "px";
                return s;
            }
            return 1;
        }

        function applyScale(container, inner, s) {
            if (!container || !inner) return;
            inner.style.transform = s < 1 ? "scale(" + s + ")" : "none";
            container.style.height = s < 1 ? (inner.offsetHeight * s) + "px" : "";

        function initMobileSwipe() {
            const root = document.getElementById("raceTables");
            if (!root) return;

            const mq = window.matchMedia("(max-width: 640px) and (hover: none) and (pointer: coarse)");
            if (initMobileSwipe._bound !== true) {
                const onChange = () => initMobileSwipe();
                if (mq.addEventListener) mq.addEventListener("change", onChange);
                else if (mq.addListener) mq.addListener(onChange);
                initMobileSwipe._bound = true;
            }

            if (initMobileSwipe._abort && initMobileSwipe._abort.abort) {
                initMobileSwipe._abort.abort();
            }
            initMobileSwipe._abort = null;

            if (!mq.matches) return;

            const ac = (typeof AbortController !== "undefined") ? new AbortController() : null;
            initMobileSwipe._abort = ac;

            let sx = 0, sy = 0, active = false, lock = false;

            const start = (e) => {
                const t = e.touches ? e.touches[0] : null;
                if (!t) return;
                sx = t.clientX; sy = t.clientY;
                active = true; lock = false;
            };

            const move = (e) => {
                if (!active || !e.touches || e.touches.length !== 1) return;
                const t = e.touches[0];
                const dx = t.clientX - sx, dy = t.clientY - sy;
                if (!lock) {
                    if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) lock = true;
                    else return;
                }
                e.preventDefault();
            };

            const end = (e) => {
                if (!active) return;
                active = false;
                const t = e.changedTouches ? e.changedTouches[0] : null;
                if (!t) return;
                const dx = t.clientX - sx, dy = t.clientY - sy;
                if (Math.abs(dx) < 45 || Math.abs(dx) <= Math.abs(dy)) return;
                const cur = Number(document.body.getAttribute("data-focus-race") || "1") || 1;
                const next = dx < 0 ? Math.min(TOTAL_RACES, cur + 1) : Math.max(1, cur - 1);
                if (next !== cur) applyRaceFocus(String(next));
            };

            root.addEventListener("touchstart", start, ac ? { passive: true, signal: ac.signal } : { passive: true });
            root.addEventListener("touchmove", move, ac ? { passive: false, signal: ac.signal } : { passive: false });
            root.addEventListener("touchend", end, ac ? { passive: true, signal: ac.signal } : { passive: true });
            root.addEventListener("touchcancel", end, ac ? { passive: true, signal: ac.signal } : { passive: true });
        }

        function parseStatsRecord(stats) {
            const m = /\((\d+)-(\d+)-(\d+)-(\d+)\)/.exec(stats || "");

            return { wins, starts: wins + seconds + thirds + others };

        function getProbabilityThresholdStarts(table, targetProbability) {
            if (!Array.isArray(table) || !table.length) return null;
            let best = null;
            for (const item of table) {
                const starts = Number(item?.starts);
                const probability = Number(item?.probability);
                if (!Number.isFinite(starts) || !Number.isFinite(probability)) continue;
                if (probability > targetProbability) continue;
                const diff = targetProbability - probability;
                if (!best || diff < best.diff || (diff === best.diff && starts < best.starts)) {
                    best = { starts, probability, diff };
                }
            }
            return best;
        }

        function hashString(value) {
            let hash = 0;
            const text = String(value || "");
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
            }
            return Math.abs(hash);
        }

        function componentToHex(value) {
            const hex = Math.max(0, Math.min(255, Math.round(value))).toString(16);
            return hex.length === 1 ? "0" + hex : hex;
        }

        function hslToHex(h, s, l) {
            const hue = (((h % 360) + 360) % 360) / 360;
            const sat = Math.max(0, Math.min(100, s)) / 100;
            const light = Math.max(0, Math.min(100, l)) / 100;
            const q = light < 0.5 ? light * (1 + sat) : light + sat - light * sat;
            const p = 2 * light - q;
            const toRgb = t => {
                let v = t;
                if (v < 0) v += 1;
                if (v > 1) v -= 1;
                if (v < 1 / 6) return p + (q - p) * 6 * v;
                if (v < 1 / 2) return q;
                if (v < 2 / 3) return p + (q - p) * (2 / 3 - v) * 6;
                return p;
            };
            return `#${componentToHex(toRgb(hue + 1 / 3) * 255)}${componentToHex(toRgb(hue) * 255)}${componentToHex(toRgb(hue - 1 / 3) * 255)}`;
        }

        function generatedPersonRuleColor(index, usedColors) {
            let i = Math.max(0, Number(index) || 0);
            while (i < index + 720) {
                const color = hslToHex((i * 137.508 + 23) % 360, 72, 82);
                if (!usedColors.has(color)) return color;
                i++;
            }
            return hslToHex((index * 97 + 41) % 360, 65, 75);
        }

        function getPersonRuleColor(type, id) {
            const normalizedId = String(id || "").trim();
            ensureUniqueBgRuleColors();
            const fixedRuleColors = new Set(
                BACKGROUND_RULES
                    .filter(isFixedColorRule)
                    .map(rule => bgRuleColors[rule.key])
                    .filter(Boolean)
            );
            const availableColors = PERSON_RULE_COLOR_POOL.filter(color => !fixedRuleColors.has(color));
            const baseColors = availableColors.length ? availableColors : PERSON_RULE_COLOR_POOL;
            if (!normalizedId) return baseColors[0];

            const keys = [...new Set(
                Array.from(document.querySelectorAll(".custom-select"))
                    .flatMap(sel => {
                        if (!hasAnyMark(sel)) return [];
                        const items = [];
                        const jid = String(sel.dataset.jid || "").trim();
                        const tid = String(sel.dataset.tid || "").trim();
                        if (jid && isJockeyWithoutDailyMultiWin5Years(sel) && getSelectedJockeyRaceCount(sel) >= 2) {
                            items.push(`jockeyNoDaily:${jid}`);
                        }
                        if (tid && isTrainerWithoutDailyMultiWin5Years(sel) && getSelectedTrainerRaceCount(sel) >= 2) {
                            items.push(`trainerNoDaily:${tid}`);
                        }
                        if (jid && isJockeyPreviousWin5Winner(sel) && getSelectedJockeyPreviousWin5WinnerRaceCount(sel) >= 2) {
                            items.push(`jockeyPrevious:${jid}`);
                        }
                        if (tid && isTrainerPreviousWin5Winner(sel) && getSelectedTrainerPreviousWin5WinnerRaceCount(sel) >= 2) {
                            items.push(`trainerPrevious:${tid}`);
                        }
                        return items;
                    })
            )].sort();
            const targetKey = `${type}:${normalizedId}`;
            let index = keys.indexOf(targetKey);
            if (index < 0) index = keys.length + (hashString(targetKey) % 1000);
            if (index < baseColors.length) return baseColors[index];
            const usedColors = new Set([...fixedRuleColors, ...baseColors]);
            let generated = "";
            for (let i = baseColors.length; i <= index; i++) {
                generated = generatedPersonRuleColor(i - baseColors.length, usedColors);
                usedColors.add(generated);
            }
            return generated;
        }

        function syncPersonToggle(key) {
            currentPerson = key;
            allPersonOptions.forEach(o => o.classList.toggle('active', o.dataset.key === currentPerson));
            updateStatsPopLabel();
            applyPersonDisplay();
            kickStatsFetch();
            saveState();
        }

        statsToggleEl.addEventListener("click", (e) => {
            const opt = e.target.closest(".sort-option");
            if (!opt) return;
            const key = opt.dataset.key;
            const nextModes = [...currentStatsModes];
            const index = nextModes.indexOf(key);
            if (index >= 0) {
                nextModes.splice(index, 1);
            } else {
                nextModes.push(key);
            }
            syncStatsToggle(nextModes);
        });

        yearsToggleEl.addEventListener("click", (e) => {
            const opt = e.target.closest(".sort-option");
            if (!opt || opt.dataset.key === currentStatsYears) return;
            syncYearsToggle(opt.dataset.key);
        });

        personToggleEl.addEventListener("click", (e) => {
            const opt = e.target.closest(".sort-option");
            if (!opt || opt.dataset.key === currentPerson) return;
            syncPersonToggle(opt.dataset.key);
        });

        function getStatsKeysForModes(modes, raceInfo, raceCourses) {
            const modeSet = new Set(modes);
            const keysPerRace = [];
            for (let i = 0; i < TOTAL_RACES; i++) {
                const venue = modeSet.has('venue') ? extractVenue(raceInfo[i]) : "*";
                const course = extractCourse(raceCourses[i]);
                const surfaceMatch = course.match(/^(芝|ダ|障)/);
                const surface = surfaceMatch ? surfaceMatch[1] : "";
                const distanceMatch = course.match(/^(?:芝|ダ|障)(\d+)/);
                const distance = modeSet.has('distance') ? getDistanceCategory(distanceMatch ? Number(distanceMatch[1]) : null) : "*";
                keysPerRace.push((venue && surface && distance) ? `${venue}:${surface}:${distance}` : "");
            }
            return keysPerRace;
        }

        async function fetchAndApplyJockeyStats(personOverride = currentPerson, { updateDisplay = true, years = currentStatsYears, modes = currentStatsModes, datasetKey = null, save = true } = {}) {
            const raceInfo = window.raceInfo || [];
            const raceCourses = window.raceCourses || [];
            const statsModes = normalizeStatsModes(modes);
            const personAtFetch = personOverride;
            const targetDatasetKey = datasetKey || (personAtFetch === 'trainer' ? 'tstats' : 'jstats');
            const apiMode = 'combo';
            const keysPerRace = getStatsKeysForModes(statsModes, raceInfo, raceCourses);
            const validKeys = [...new Set(keysPerRace.filter(k => k))];
            if (datasetKey) {
                document.querySelectorAll('.custom-select').forEach(sel => {
                    sel.dataset[targetDatasetKey] = "";
                });
            }
            if (validKeys.length === 0) return;

            try {
                const cacheKey = JSON.stringify({
                    mode: apiMode,
                    years: String(years),
                    person: personAtFetch,
                    q: validKeys.join(",")
                });
                let json = statsFetchCache.get(cacheKey);
                if (!json) {
                    const u = new URL("stats", WIN5_API);
                    u.searchParams.set("mode", apiMode);
                    u.searchParams.set("years", years);
                    u.searchParams.set("person", personAtFetch);
                    u.searchParams.set("q", validKeys.join(","));
                    const res = await fetch(u.toString(), { cache: "no-store" });
                    json = await res.json();
                    if (json.ok && json.stats) statsFetchCache.set(cacheKey, json);
                }
                if (!json.ok || !json.stats) return;

                for (let r = 0; r < TOTAL_RACES; r++) {
                    const key = keysPerRace[r];
                    if (!key) continue;
                    const statsMap = json.stats[key];
                    if (!statsMap) continue;

                    document.querySelectorAll(`.custom-select[data-race="${r + 1}"]`).forEach(sel => {
                        if (sel.classList.contains("is-empty")) return;
                        if (sel.classList.contains("is-scratched")) return;
                        const id = (sel.dataset[personAtFetch === 'trainer' ? 'tid' : 'jid'] || "").trim();
                        if (!id) {
                            sel.dataset[targetDatasetKey] = "";
                            return;
                        }
                        const s = statsMap[id] || [0,0,0,0];
                        sel.dataset[targetDatasetKey] = `(${s[0]}-${s[1]}-${s[2]}-${s[3]})`;
                    });
                }
                if (updateDisplay && personAtFetch === currentPerson && targetDatasetKey === (personAtFetch === 'trainer' ? 'tstats' : 'jstats')) applyPersonDisplay();
                if (save) saveState();
            } catch (e) {
                console.warn("fetchAndApplyJockeyStats:", e);
            }
        }

        function syncMaxFavOptions(preferredMax) {
            const minEl = document.getElementById('minFav');
            const maxEl = document.getElementById('maxFav');
            if (!minEl || !maxEl) return;

            const minN = Number(minEl.value);
            const lo = Number.isFinite(minN) && minN >= 1 && minN <= TOTAL_RACES
                ? Math.trunc(minN)
                : 1;
            const prevMax = preferredMax !== undefined ? Number(preferredMax) : Number(maxEl.value);
            maxEl.replaceChildren();
            for (let n = lo; n <= TOTAL_RACES; n++) {
                const opt = document.createElement('option');
                opt.value = String(n);
                opt.textContent = String(n);
                maxEl.appendChild(opt);
            }
            const nextMax = Number.isFinite(prevMax) && prevMax >= lo && prevMax <= TOTAL_RACES
                ? Math.trunc(prevMax)
                : lo;
            maxEl.value = String(nextMax);
        }

        function initFavRangeControls() {
            const minEl = document.getElementById('minFav');
            const maxEl = document.getElementById('maxFav');
            if (!minEl || !maxEl) return;
            minEl.addEventListener('change', () => {
                syncMaxFavOptions();
                saveState();
            });
            maxEl.addEventListener('change', () => saveState());
            syncMaxFavOptions();
        }

        createRaceTables();
        applyRaceFocus(isMobileLayout() ? "1" : "all");
        initMobileSwipe();
        restoreState();
        updateStatsPopLabel();
        applyShareFromURL();
        loadWin5Tabs();
        fetchPopularityBandWinRates();
        initFavRangeControls();
        fitAll();
    </script>
</body>

</html>
