        async function importShareText() {
            let token = null;

            try {
                const clip = (await navigator.clipboard.readText()) || "";
                const t = extractShareToken(clip.trim());
                if (t) token = t;
            } catch (e) { }

            if (!token) {
                showToast("共有URLがありません", { type: "error" });
                return;
            }

            if (hasExistingMarks()) {
                if (!confirm("現在の印が上書きされます。よろしいですか？")) return;
            }

            try {
                const payload = decodeSharePayload(token);
                applySharePayload(payload);
                closeShare();
                showToast("読み込みました");
            } catch (e) {
                showToast("読み込み失敗", { type: "error" });
            }
        }

        function extractShareToken(txt) {
            const t = (txt || "").trim();
            const m = t.match(/[?#&]share=([A-Za-z0-9\-_]+)/);
            if (m) return m[1];
            if (/^[A-Za-z0-9\-_]{4,}$/.test(t)) return t;
            return null;
        }

        function buildSharePayload() {
            const items = [];
            document.querySelectorAll(".custom-select").forEach(sel => {
                if (sel.classList.contains("is-empty")) return;
                if (sel.classList.contains("is-scratched")) return;
                const r = Number(sel.dataset.race);
                const h = Number(sel.dataset.horse);
                const box = sel.querySelector(".selected");
                const mark = (box?.textContent || "").trim();
                const bg = (box?.dataset.bg || "none").trim();

                if (mark || (bg && bg !== "none")) {
                    items.push([r, h, mark, bg]);
                }
            });
            return { v: 1, items };
        }

        function normalizeShareItem(it) {
            if (!Array.isArray(it) || it.length < 4) return null;
            const r = Number(it[0]);
            const h = Number(it[1]);
            if (!Number.isInteger(r) || !Number.isInteger(h) || r < 1 || r > TOTAL_RACES || h < 1 || h > HORSE_MAX) return null;

            const mark = String(it[2] ?? "").trim();
            if (!MARKS.includes(mark)) return null;

            const bg = serializeBg(it[3] ?? "none");
            return [r, h, mark, bg];
        }

        function normalizeSharePayload(payload) {
            if (!payload || payload.v !== 1 || !Array.isArray(payload.items)) return null;
            const items = [];
            const seen = new Set();

            for (const it of payload.items) {
                const normalized = normalizeShareItem(it);
                if (!normalized) return null;
                const key = `${normalized[0]}:${normalized[1]}`;
                if (seen.has(key)) return null;
                seen.add(key);
                items.push(normalized);
            }

            return { v: 1, items };
        }

        function applySharePayload(payload) {
            const normalizedPayload = normalizeSharePayload(payload);
            if (!normalizedPayload) throw new Error("Invalid share payload");

            document.querySelectorAll(".custom-select").forEach(sel => {
                const box = sel.querySelector(".selected");
                if (!box) return;
                box.textContent = "";
                box.dataset.bg = "none";
                box.dataset.bgSource = "";
                applyMarkBackground(sel, false);
                applyBg(sel, "none");
            });

            for (const it of normalizedPayload.items) {
                const [r, h, mark, bg] = it;

                const sel = document.querySelector(`.custom-select[data-race="${r}"][data-horse="${h}"]`);
                if (!sel || sel.classList.contains("is-empty") || sel.classList.contains("is-scratched")) continue;

                const box = sel.querySelector(".selected");
                if (!box) continue;

                const m = (mark || "").toString();
                const b = (bg || "none").toString();

                box.textContent = m;
                applyMarkBackground(sel, !!m);

                setRowBackground(sel, b, b === "none" ? "" : "manual");
            }

            saveState();
        }

        function encodeSharePayload(obj) {
            const legacy = () => {
                const json = JSON.stringify(obj);
                const b64 = btoa(unescape(encodeURIComponent(json)));
                return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
            };

            if (!obj || obj.v !== 1 || !Array.isArray(obj.items) || obj.items.length === 0) return legacy();

            const colorToId = new Map();
            for (let i = 0; i < BG_COLORS.length; i++) colorToId.set(BG_COLORS[i], i + 1);

            const markToId = (m) => {
                if (m === "") return 0;
                if (m === "✓") return 1;
                if (m === "◎") return 2;
                return null;
            };

            const parseHexColor = (color) => {
                const m = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.exec(String(color || "").trim());
                if (!m) return null;
                const hex = m[1].length === 3
                    ? m[1].split("").map(ch => ch + ch).join("")
                    : m[1];
                return {
                    color: `#${hex.toLowerCase()}`,
                    r: parseInt(hex.slice(0, 2), 16),
                    g: parseInt(hex.slice(2, 4), 16),
                    b: parseInt(hex.slice(4, 6), 16),
                };
            };

            const shareKnownColors = [...new Set(SHARE_COLOR_TABLE_V1.map(c => {
                const parsed = parseHexColor(c);
                return parsed ? parsed.color : String(c || "").toLowerCase();
            }))];
            const knownColorToId = new Map(shareKnownColors.map((color, i) => [color, i]));

            const makeToken = (prefix, bytes) => {
                let bin = "";
                for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
                const b64 = btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
                return prefix + b64;
            };

            const setBit = (bytes, index) => {
                bytes[index >> 3] |= 1 << (index & 7);
            };

            const encodedItems = [];
            let needsMaskFormat = false;
            let needsPaletteFormat = false;
            let canUseKnownColorFormat = true;
            let canUseSetFormat = true;
            const palette = [];
            const paletteIndex = new Map();

            const addPaletteColor = (color) => {
                const parsed = parseHexColor(color);
                if (!parsed) return null;
                if (!paletteIndex.has(parsed.color)) {
                    if (palette.length >= 32) return null;
                    paletteIndex.set(parsed.color, palette.length);
                    palette.push(parsed);
                }
                return paletteIndex.get(parsed.color);
            };

            for (const it of obj.items) {
                if (!Array.isArray(it) || it.length < 4) continue;
                const r = Number(it[0]);
                const h = Number(it[1]);
                const mark = String(it[2] ?? "").trim();
                const bg = String(it[3] ?? "none").trim();

                if (!Number.isFinite(r) || !Number.isFinite(h) || r < 1 || r > 5 || h < 1 || h > 18) return legacy();

                const mid = markToId(mark);
                if (mid === null) return legacy();

                let bid = 0;
                let mask = 0;
                let paletteMask = 0;
                const colors = (bg && bg !== "none") ? normalizeBgColors(bg) : [];
                if (bg && bg !== "none" && colors.length === 0) return legacy();
                const knownColorIds = [];
                const itemColors = [];

                for (const color of colors) {
                    const parsed = parseHexColor(color);
                    if (!parsed) canUseSetFormat = false;
                    const normalizedColor = parsed ? parsed.color : String(color || "").toLowerCase();
                    itemColors.push(normalizedColor);

                    const got = colorToId.get(color);
                    if (got) {
                        if (bid === 0) bid = got;
                        mask |= 1 << (got - 1);
                    } else {
                        needsPaletteFormat = true;
                    }

                    const paletteId = addPaletteColor(color);
                    if (paletteId === null) return legacy();
                    paletteMask |= 1 << paletteId;

                    const knownId = parsed ? knownColorToId.get(parsed.color) : null;
                    if (knownId === undefined || knownId === null || knownId > 63) {
                        canUseKnownColorFormat = false;
                    } else {
                        knownColorIds.push(knownId);
                    }
                }

                if (colors.length !== knownColorIds.length || colors.length > 63) canUseKnownColorFormat = false;
                if (colors.length > 1) needsMaskFormat = true;
                encodedItems.push({ r, h, mid, bid, mask, paletteMask, knownColorIds, colors: itemColors });
            }

            if (encodedItems.length === 0) return legacy();

            const candidates = [];

            if (canUseKnownColorFormat) {
                const knownBytes = [];
                for (const item of encodedItems) {
                    const pos = ((item.r - 1) * HORSE_MAX) + (item.h - 1);
                    knownBytes.push(pos & 0xff, ((item.mid & 0x3) << 6) | (item.knownColorIds.length & 0x3f));
                    for (const colorId of item.knownColorIds) knownBytes.push(colorId & 0x3f);
                }
                candidates.push(makeToken("6", knownBytes));
            }

            if (canUseSetFormat) {
                const selectedMask = new Array(12).fill(0);
                const itemByPos = new Map();
                const colorSet = new Set();

                for (const item of encodedItems) {
                    const pos = ((item.r - 1) * HORSE_MAX) + (item.h - 1);
                    setBit(selectedMask, pos);
                    itemByPos.set(pos, item);
                    for (const color of item.colors) colorSet.add(color);
                }

                const positions = [];
                for (let pos = 0; pos < TOTAL_RACES * HORSE_MAX; pos++) {
                    if (selectedMask[pos >> 3] & (1 << (pos & 7))) positions.push(pos);
                }

                const markBytes = new Array(Math.ceil((positions.length * 2) / 8)).fill(0);
                positions.forEach((pos, index) => {
                    const mid = itemByPos.get(pos)?.mid || 0;
                    const bit = index * 2;
                    markBytes[bit >> 3] |= (mid & 0x3) << (bit & 7);
                });

                const colorList = [...colorSet];
                if (colorList.length <= 63) {
                    const maskSize = Math.ceil(positions.length / 8);
                    const setBytes = [...selectedMask, ...markBytes, colorList.length & 0x3f];

                    for (const color of colorList) {
                        const knownId = knownColorToId.get(color);
                        if (knownId !== undefined && knownId !== null && knownId <= 63) {
                            setBytes.push(knownId & 0x3f);
                        } else {
                            const parsed = parseHexColor(color);
                            if (!parsed) {
                                canUseSetFormat = false;
                                break;
                            }
                            setBytes.push(0x80, parsed.r, parsed.g, parsed.b);
                        }

                        const colorMask = new Array(maskSize).fill(0);
                        positions.forEach((pos, index) => {
                            const item = itemByPos.get(pos);
                            if (item?.colors?.includes(color)) setBit(colorMask, index);
                        });
                        setBytes.push(...colorMask);
                    }

                    if (canUseSetFormat) candidates.push(makeToken("7", setBytes));
                }
            }

            if (needsPaletteFormat) {
                const bytes = [];
                const itemSize = palette.length <= 16 ? 4 : 6;
                bytes.push(palette.length & 0xff, itemSize);
                for (const color of palette) bytes.push(color.r, color.g, color.b);

                for (const item of encodedItems) {
                    const pos = ((item.r - 1) * HORSE_MAX) + (item.h - 1);
                    if (itemSize === 4) {
                        const v = ((pos & 0x7f) << 18) | ((item.mid & 0x3) << 16) | (item.paletteMask & 0xffff);
                        bytes.push((v >> 24) & 0xff, (v >> 16) & 0xff, (v >> 8) & 0xff, v & 0xff);
                    } else {
                        bytes.push(pos & 0xff, item.mid & 0x3);
                        bytes.push(
                            (item.paletteMask >>> 24) & 0xff,
                            (item.paletteMask >>> 16) & 0xff,
                            (item.paletteMask >>> 8) & 0xff,
                            item.paletteMask & 0xff
                        );
                    }
                }

                candidates.push(makeToken("5", bytes));
            }

            const bytes = [];
            for (const item of encodedItems) {
                const rv = (item.r - 1) & 0x7;
                const hv = (item.h - 1) & 0x1f;
                if (needsMaskFormat) {
                    const v = (rv << 14) | (hv << 9) | ((item.mid & 0x3) << 7) | (item.mask & 0x7f);
                    bytes.push((v >> 16) & 0xff, (v >> 8) & 0xff, v & 0xff);
                } else {
                    const v = (rv << 12) | (hv << 7) | ((item.mid & 0x3) << 5) | (item.bid & 0x1f);
                    bytes.push((v >> 8) & 0xff, v & 0xff);
                }
            }
            if (!needsPaletteFormat) candidates.push(makeToken(needsMaskFormat ? "4" : "3", bytes));

            candidates.push(legacy());
            return candidates.reduce((best, token) => token.length < best.length ? token : best);
        }

        function decodeSharePayload(token) {
            const legacy = (tok) => {
                const t = tok.replace(/-/g, "+").replace(/_/g, "/");
                const pad = t.length % 4 ? "=".repeat(4 - (t.length % 4)) : "";
                const json = decodeURIComponent(escape(atob(t + pad)));
                return JSON.parse(json);
            };

            const tok = String(token ?? "").trim();
            const shareKnownColors = SHARE_COLOR_TABLE_V1.map(c => String(c || "").toLowerCase());

            if (tok && tok[0] === "3") {
                try {
                    const raw = tok.slice(1).replace(/-/g, "+").replace(/_/g, "/");
                    const pad = raw.length % 4 ? "=".repeat(4 - (raw.length % 4)) : "";
                    const bin = atob(raw + pad);
                    const bytes = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    if (bytes.length % 2 !== 0) return legacy(tok);

                    const idToMark = ["", "✓", "◎", ""];
                    const items = [];

                    for (let i = 0; i < bytes.length; i += 2) {
                        const v = (bytes[i] << 8) | bytes[i + 1];
                        const r = ((v >> 12) & 0x7) + 1;
                        const h = ((v >> 7) & 0x1f) + 1;
                        const mid = (v >> 5) & 0x3;
                        const bid = v & 0x1f;

                        if (r < 1 || r > 5 || h < 1 || h > 18) return legacy(tok);

                        const mark = idToMark[mid] ?? "";
                        const bg = bid === 0 ? "none" : (BG_COLORS[bid - 1] || "none");
                        items.push([r, h, mark, bg]);
                    }

                    return { v: 1, items };
                } catch (e) {
                    return legacy(tok);
                }
            }

            if (tok && tok[0] === "4") {
                try {
                    const raw = tok.slice(1).replace(/-/g, "+").replace(/_/g, "/");
                    const pad = raw.length % 4 ? "=".repeat(4 - (raw.length % 4)) : "";
                    const bin = atob(raw + pad);
                    const bytes = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    if (bytes.length % 3 !== 0) return legacy(tok);

                    const idToMark = ["", "✓", "◎", ""];
                    const items = [];

                    for (let i = 0; i < bytes.length; i += 3) {
                        const v = (bytes[i] << 16) | (bytes[i + 1] << 8) | bytes[i + 2];
                        const r = ((v >> 14) & 0x7) + 1;
                        const h = ((v >> 9) & 0x1f) + 1;
                        const mid = (v >> 7) & 0x3;
                        const mask = v & 0x7f;

                        if (r < 1 || r > 5 || h < 1 || h > 18) return legacy(tok);

                        const mark = idToMark[mid] ?? "";
                        const colors = [];
                        for (let c = 0; c < BG_COLORS.length; c++) {
                            if (mask & (1 << c)) colors.push(BG_COLORS[c]);
                        }
                        const bg = colors.length ? colors.join(",") : "none";
                        items.push([r, h, mark, bg]);
                    }

                    return { v: 1, items };
                } catch (e) {
                    return legacy(tok);
                }
            }

            if (tok && tok[0] === "5") {
                try {
                    const raw = tok.slice(1).replace(/-/g, "+").replace(/_/g, "/");
                    const pad = raw.length % 4 ? "=".repeat(4 - (raw.length % 4)) : "";
                    const bin = atob(raw + pad);
                    const bytes = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    if (bytes.length < 2) return legacy(tok);

                    const paletteLength = bytes[0];
                    const itemSize = bytes[1];
                    if (paletteLength < 1 || paletteLength > 32 || (itemSize !== 4 && itemSize !== 6)) return legacy(tok);

                    let offset = 2;
                    if (bytes.length < offset + (paletteLength * 3)) return legacy(tok);

                    const palette = [];
                    for (let i = 0; i < paletteLength; i++) {
                        const r = bytes[offset++];
                        const g = bytes[offset++];
                        const b = bytes[offset++];
                        palette.push(`#${[r, g, b].map(v => v.toString(16).padStart(2, "0")).join("")}`);
                    }

                    if ((bytes.length - offset) % itemSize !== 0) return legacy(tok);

                    const idToMark = ["", "✓", "◎", ""];
                    const items = [];

                    while (offset < bytes.length) {
                        let pos = 0;
                        let mid = 0;
                        let mask = 0;

                        if (itemSize === 4) {
                            const v = (bytes[offset] << 24) | (bytes[offset + 1] << 16) | (bytes[offset + 2] << 8) | bytes[offset + 3];
                            offset += 4;
                            pos = (v >> 18) & 0x7f;
                            mid = (v >> 16) & 0x3;
                            mask = v & 0xffff;
                        } else {
                            pos = bytes[offset++];
                            mid = bytes[offset++] & 0x3;
                            mask = (
                                (bytes[offset] << 24) |
                                (bytes[offset + 1] << 16) |
                                (bytes[offset + 2] << 8) |
                                bytes[offset + 3]
                            ) >>> 0;
                            offset += 4;
                        }

                        const r = Math.floor(pos / HORSE_MAX) + 1;
                        const h = (pos % HORSE_MAX) + 1;
                        if (r < 1 || r > 5 || h < 1 || h > 18) return legacy(tok);

                        const colors = [];
                        for (let c = 0; c < palette.length; c++) {
                            if (mask & (1 << c)) colors.push(palette[c]);
                        }
                        const mark = idToMark[mid] ?? "";
                        const bg = colors.length ? colors.join(",") : "none";
                        items.push([r, h, mark, bg]);
                    }

                    return { v: 1, items };
                } catch (e) {
                    return legacy(tok);
                }
            }

            if (tok && tok[0] === "6") {
                try {
                    const raw = tok.slice(1).replace(/-/g, "+").replace(/_/g, "/");
                    const pad = raw.length % 4 ? "=".repeat(4 - (raw.length % 4)) : "";
                    const bin = atob(raw + pad);
                    const bytes = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

                    const idToMark = ["", "✓", "◎", ""];
                    const items = [];
                    let offset = 0;

                    while (offset < bytes.length) {
                        if (offset + 2 > bytes.length) return legacy(tok);

                        const pos = bytes[offset++];
                        const meta = bytes[offset++];
                        const mid = (meta >> 6) & 0x3;
                        const colorCount = meta & 0x3f;
                        if (offset + colorCount > bytes.length) return legacy(tok);

                        const r = Math.floor(pos / HORSE_MAX) + 1;
                        const h = (pos % HORSE_MAX) + 1;
                        if (r < 1 || r > 5 || h < 1 || h > 18) return legacy(tok);

                        const colors = [];
                        for (let i = 0; i < colorCount; i++) {
                            const color = shareKnownColors[bytes[offset++]];
                            if (!color) return legacy(tok);
                            colors.push(color);
                        }

                        const mark = idToMark[mid] ?? "";
                        const bg = colors.length ? colors.join(",") : "none";
                        items.push([r, h, mark, bg]);
                    }

                    return { v: 1, items };
                } catch (e) {
                    return legacy(tok);
                }
            }

            if (tok && tok[0] === "7") {
                try {
                    const raw = tok.slice(1).replace(/-/g, "+").replace(/_/g, "/");
                    const pad = raw.length % 4 ? "=".repeat(4 - (raw.length % 4)) : "";
                    const bin = atob(raw + pad);
                    const bytes = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    if (bytes.length < 13) return legacy(tok);

                    const hasBit = (arr, index) => !!(arr[index >> 3] & (1 << (index & 7)));
                    const selectedMask = bytes.slice(0, 12);
                    const positions = [];
                    for (let pos = 0; pos < TOTAL_RACES * HORSE_MAX; pos++) {
                        if (hasBit(selectedMask, pos)) positions.push(pos);
                    }

                    const markBytesLength = Math.ceil((positions.length * 2) / 8);
                    let offset = 12;
                    if (bytes.length < offset + markBytesLength + 1) return legacy(tok);

                    const markBytes = bytes.slice(offset, offset + markBytesLength);
                    offset += markBytesLength;

                    const idToMark = ["", "✓", "◎", ""];
                    const itemsByPos = new Map();
                    positions.forEach((pos, index) => {
                        const bit = index * 2;
                        const mid = (markBytes[bit >> 3] >> (bit & 7)) & 0x3;
                        const r = Math.floor(pos / HORSE_MAX) + 1;
                        const h = (pos % HORSE_MAX) + 1;
                        itemsByPos.set(pos, {
                            r,
                            h,
                            mark: idToMark[mid] ?? "",
                            colors: []
                        });
                    });

                    const colorCount = bytes[offset++];
                    const colorMaskLength = Math.ceil(positions.length / 8);

                    for (let i = 0; i < colorCount; i++) {
                        if (offset >= bytes.length) return legacy(tok);

                        let color = "";
                        const descriptor = bytes[offset++];
                        if (descriptor & 0x80) {
                            if (offset + 3 > bytes.length) return legacy(tok);
                            const r = bytes[offset++];
                            const g = bytes[offset++];
                            const b = bytes[offset++];
                            color = `#${[r, g, b].map(v => v.toString(16).padStart(2, "0")).join("")}`;
                        } else {
                            color = shareKnownColors[descriptor];
                            if (!color) return legacy(tok);
                        }

                        if (offset + colorMaskLength > bytes.length) return legacy(tok);
                        const colorMask = bytes.slice(offset, offset + colorMaskLength);
                        offset += colorMaskLength;

                        positions.forEach((pos, index) => {
                            if (hasBit(colorMask, index)) itemsByPos.get(pos)?.colors.push(color);
                        });
                    }

                    if (offset !== bytes.length) return legacy(tok);

                    const items = positions.map(pos => {
                        const item = itemsByPos.get(pos);
                        const bg = item.colors.length ? item.colors.join(",") : "none";
                        return [item.r, item.h, item.mark, bg];
                    });

                    return { v: 1, items };
                } catch (e) {
                    return legacy(tok);
                }
            }

            return legacy(tok);
        }

        function fitWithScale(container, inner) {
            if (!container || !inner) return 1;
            inner.style.transform = "none";
            container.style.height = "";
            const innerW = inner.scrollWidth;
            const containerW = container.clientWidth;
            if (innerW > containerW && containerW > 0) {
                const s = containerW / innerW;
                inner.style.transform = "scale(" + s + ")";
                container.style.height = (inner.offsetHeight * s) + "px";
                return s;
            }
            return 1;
        }

        function applyScale(container, inner, s) {
            if (!container || !inner) return;
            inner.style.transform = s < 1 ? "scale(" + s + ")" : "none";
            container.style.height = s < 1 ? (inner.offsetHeight * s) + "px" : "";
        }

        function initMobileSwipe() {
            const root = document.getElementById("raceTables");
            if (!root) return;

            const mq = window.matchMedia("(max-width: 640px) and (hover: none) and (pointer: coarse)");
            if (initMobileSwipe._bound !== true) {
                const onChange = () => initMobileSwipe();
                if (mq.addEventListener) mq.addEventListener("change", onChange);
                else if (mq.addListener) mq.addListener(onChange);
                initMobileSwipe._bound = true;
            }

            if (initMobileSwipe._abort && initMobileSwipe._abort.abort) {
                initMobileSwipe._abort.abort();
            }
            initMobileSwipe._abort = null;

            if (!mq.matches) return;

            const ac = (typeof AbortController !== "undefined") ? new AbortController() : null;
            initMobileSwipe._abort = ac;

            let sx = 0, sy = 0, active = false, lock = false;

            const start = (e) => {
                const t = e.touches ? e.touches[0] : null;
                if (!t) return;
                sx = t.clientX; sy = t.clientY;
                active = true; lock = false;
            };

            const move = (e) => {
                if (!active || !e.touches || e.touches.length !== 1) return;
                const t = e.touches[0];
                const dx = t.clientX - sx, dy = t.clientY - sy;
                if (!lock) {
                    if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) lock = true;
                    else return;
                }
                e.preventDefault();
            };

            const end = (e) => {
                if (!active) return;
                active = false;
                const t = e.changedTouches ? e.changedTouches[0] : null;
                if (!t) return;
                const dx = t.clientX - sx, dy = t.clientY - sy;
                if (Math.abs(dx) < 45 || Math.abs(dx) <= Math.abs(dy)) return;
                const cur = Number(document.body.getAttribute("data-focus-race") || "1") || 1;
                const next = dx < 0 ? Math.min(TOTAL_RACES, cur + 1) : Math.max(1, cur - 1);
                if (next !== cur) applyRaceFocus(String(next));
            };

            root.addEventListener("touchstart", start, ac ? { passive: true, signal: ac.signal } : { passive: true });
            root.addEventListener("touchmove", move, ac ? { passive: false, signal: ac.signal } : { passive: false });
            root.addEventListener("touchend", end, ac ? { passive: true, signal: ac.signal } : { passive: true });
            root.addEventListener("touchcancel", end, ac ? { passive: true, signal: ac.signal } : { passive: true });
        }

        function parseStatsRecord(stats) {
            const m = /\((\d+)-(\d+)-(\d+)-(\d+)\)/.exec(stats || "");
            if (!m) return null;
            const wins = Number(m[1]);
            const seconds = Number(m[2]);
            const thirds = Number(m[3]);
            const others = Number(m[4]);
            if (![wins, seconds, thirds, others].every(Number.isFinite)) return null;
            return { wins, starts: wins + seconds + thirds + others };
        }

        function getRaceSurface(row) {

            if (!Number.isFinite(race) || race < 1 || race > TOTAL_RACES) return "";

            const m = course.match(/^(芝|ダ)/);

        function getClosestProbabilityStarts(table, targetProbability) {
            if (!Array.isArray(table) || !table.length) return null;
            let best = null;
            for (const item of table) {
                const starts = Number(item?.starts);
                const probability = Number(item?.probability);
                if (!Number.isFinite(starts) || !Number.isFinite(probability)) continue;
                const diff = Math.abs(probability - targetProbability);
                if (!best || diff < best.diff || (diff === best.diff && starts < best.starts)) {
                    best = { starts, probability, diff };
                }
            }
            return best;
        }

        function getWins1ProbabilityThreshold(surface, person) {
            return getClosestProbabilityStarts(getWins1ProbabilityTable(person)[surface], BG_PROBABILITY_TARGET);
        }

        function applyProbabilityThresholdPayload(person, thresholds) {
            if (!thresholds) return;
            const nextTable = {};
            for (const surface of ["芝", "ダ"]) {
                const rows = thresholds[surface]?.rows;
                if (Array.isArray(rows) && rows.length) {
                    nextTable[surface] = rows.map(row => ({
                        starts: Number(row.starts),
                        probability: Number(row.probability)
                    })).filter(row => Number.isFinite(row.starts) && Number.isFinite(row.probability));
                }
            }
            if (nextTable["芝"] || nextTable["ダ"]) {
                setWins1ProbabilityTable(person, nextTable);
            }
        }

        async function fetchWins1ProbabilityThresholds(person = "jockey") {

                u.searchParams.set("person", normalizedPerson);
                u.searchParams.set("winsMax", "1");
                u.searchParams.set("target", String(BG_PROBABILITY_TARGET));
                u.searchParams.set("step", "1");
                const res = await fetch(u.toString(), { cache: "no-store" });
                const json = await res.json();
                if (!json.ok || !json.thresholds) return;

                if (normalizedPerson === "all") {
                    applyProbabilityThresholdPayload("jockey", json.thresholds.jockey);
                    applyProbabilityThresholdPayload("trainer", json.thresholds.trainer);
                    return;

                applyProbabilityThresholdPayload(normalizedPerson, json.thresholds);

        function hashString(value) {
            let hash = 0;
            const text = String(value || "");
            for (let i = 0; i < text.length; i++) {

            }
            return Math.abs(hash);

        function syncYearsToggle(key) {
            currentStatsYears = key;
            allYearsOptions.forEach(o => o.classList.toggle('active', o.dataset.key === currentStatsYears));
            updateStatsPopLabel();
            kickStatsFetch();
            saveState();
        }

        function syncPersonToggle(key) {
            currentPerson = key;
            allPersonOptions.forEach(o => o.classList.toggle('active', o.dataset.key === currentPerson));
            updateStatsPopLabel();
            applyPersonDisplay();
            kickStatsFetch();
            saveState();
        }

        statsToggleEl.addEventListener("click", (e) => {
            const opt = e.target.closest(".sort-option");
            if (!opt) return;
            const key = opt.dataset.key;
            const nextModes = [...currentStatsModes];
            const index = nextModes.indexOf(key);
            if (index >= 0) {
                nextModes.splice(index, 1);
            } else {
                nextModes.push(key);
            }
            syncStatsToggle(nextModes);
        });

        yearsToggleEl.addEventListener("click", (e) => {
            const opt = e.target.closest(".sort-option");
            if (!opt || opt.dataset.key === currentStatsYears) return;
            syncYearsToggle(opt.dataset.key);
        });

        personToggleEl.addEventListener("click", (e) => {
            const opt = e.target.closest(".sort-option");
            if (!opt || opt.dataset.key === currentPerson) return;
            syncPersonToggle(opt.dataset.key);
        });

        function getStatsKeysForModes(modes, raceInfo, raceCourses) {
            const modeSet = new Set(modes);
            const keysPerRace = [];
            for (let i = 0; i < TOTAL_RACES; i++) {
                const venue = modeSet.has('venue') ? extractVenue(raceInfo[i]) : "*";
                const course = extractCourse(raceCourses[i]);
                const surfaceMatch = course.match(/^(芝|ダ|障)/);
                const surface = surfaceMatch ? surfaceMatch[1] : "";
                const distanceMatch = course.match(/^(?:芝|ダ|障)(\d+)/);
                const distance = modeSet.has('distance') ? getDistanceCategory(distanceMatch ? Number(distanceMatch[1]) : null) : "*";
                keysPerRace.push((venue && surface && distance) ? `${venue}:${surface}:${distance}` : "");
            }
            return keysPerRace;
        }

        async function fetchAndApplyJockeyStats(personOverride = currentPerson, { updateDisplay = true, years = currentStatsYears, modes = currentStatsModes, datasetKey = null, save = true } = {}) {
            const raceInfo = window.raceInfo || [];
            const raceCourses = window.raceCourses || [];
            const statsModes = normalizeStatsModes(modes);
            const personAtFetch = personOverride;
            const targetDatasetKey = datasetKey || (personAtFetch === 'trainer' ? 'tstats' : 'jstats');
            const apiMode = 'combo';
            const keysPerRace = getStatsKeysForModes(statsModes, raceInfo, raceCourses);
            const validKeys = [...new Set(keysPerRace.filter(k => k))];
            if (datasetKey) {
                document.querySelectorAll('.custom-select').forEach(sel => {
                    sel.dataset[targetDatasetKey] = "";
                });
            }
            if (validKeys.length === 0) return;

            try {
                const cacheKey = JSON.stringify({
                    mode: apiMode,
                    years: String(years),
                    person: personAtFetch,
                    q: validKeys.join(",")
                });
                let json = statsFetchCache.get(cacheKey);
                if (!json) {
                    const u = new URL("stats", WIN5_API);
                    u.searchParams.set("mode", apiMode);
                    u.searchParams.set("years", years);
                    u.searchParams.set("person", personAtFetch);
                    u.searchParams.set("q", validKeys.join(","));
                    const res = await fetch(u.toString(), { cache: "no-store" });
                    json = await res.json();
                    if (json.ok && json.stats) statsFetchCache.set(cacheKey, json);
                }
                if (!json.ok || !json.stats) return;

                for (let r = 0; r < TOTAL_RACES; r++) {
                    const key = keysPerRace[r];
                    if (!key) continue;
                    const statsMap = json.stats[key];
                    if (!statsMap) continue;

                    document.querySelectorAll(`.custom-select[data-race="${r + 1}"]`).forEach(sel => {
                        if (sel.classList.contains("is-empty")) return;
                        if (sel.classList.contains("is-scratched")) return;
                        const id = (sel.dataset[personAtFetch === 'trainer' ? 'tid' : 'jid'] || "").trim();
                        if (!id) {
                            sel.dataset[targetDatasetKey] = "";
                            return;
                        }
                        const s = statsMap[id] || [0,0,0,0];
                        sel.dataset[targetDatasetKey] = `(${s[0]}-${s[1]}-${s[2]}-${s[3]})`;
                    });
                }
                if (updateDisplay && personAtFetch === currentPerson && targetDatasetKey === (personAtFetch === 'trainer' ? 'tstats' : 'jstats')) applyPersonDisplay();
                if (save) saveState();
            } catch (e) {
                console.warn("fetchAndApplyJockeyStats:", e);
            }
        }

        createRaceTables();
        applyRaceFocus(isMobileLayout() ? "1" : "all");
        initMobileSwipe();
        restoreState();
        updateStatsPopLabel();
        applyShareFromURL();
        loadWin5Tabs();
        fitAll();
    </script>
</body>

</html>
